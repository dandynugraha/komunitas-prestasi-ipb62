<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aksara Karya 62 x Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 font-sans">

    <div id="app">
        <nav class="bg-white p-4 shadow-sm flex justify-between items-center border-b border-blue-100">
            <h1 class="font-black text-blue-900 tracking-tighter text-xl">AK62 <span class="text-orange-500">DATABASE</span></h1>
            <div id="navItems" class="space-x-4">
                <button onclick="showModal('login')" class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">Login</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6">
            <div id="homeView">
                <div class="bg-gradient-to-br from-blue-900 to-indigo-800 text-white p-10 rounded-3xl mb-10 relative overflow-hidden">
                    <div class="relative z-10">
                        <h2 class="text-4xl font-bold mb-2">Komunitas Prestasi IPB</h2>
                        <p class="opacity-80 text-lg">Aksara Karya 62 - Mengukir prestasi dalam harmoni.</p>
                    </div>
                    <div class="absolute -right-10 -bottom-10 w-64 h-64 bg-white opacity-5 rounded-full"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="md:col-span-2 space-y-6">
                        <h3 class="text-xl font-bold border-l-4 border-orange-500 pl-3">Update Prestasi Terbaru</h3>
                        <div id="achievementList" class="grid grid-cols-1 gap-4">
                            <p class="text-slate-400">Memuat prestasi...</p>
                        </div>
                    </div>
                    
                    <div class="bg-white p-6 rounded-3xl shadow-sm h-fit">
                        <h3 class="text-xl font-bold mb-4">🏆 Leaderboard</h3>
                        <div id="leaderboardList" class="space-y-4">
                            </div>
                    </div>
                </div>
            </div>

            <div id="dashboardView" class="hidden">
                </div>
        </main>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center backdrop-blur-sm z-50">
        <div class="bg-white p-8 rounded-3xl w-96 shadow-2xl scale-95 transition-transform">
            <h2 class="text-2xl font-bold mb-2 text-center text-blue-900">Selamat Datang</h2>
            <p class="text-slate-500 text-center mb-6 text-sm">Masuk dengan akun Aksara Karya kamu</p>
            <input type="email" id="email" placeholder="Email IPB" class="w-full mb-3 p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Kode Anggota" class="w-full mb-6 p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-bold shadow-xl shadow-blue-200">MASUK</button>
            <button onclick="closeModal()" class="w-full mt-4 text-slate-400 text-sm">Tutup</button>
        </div>
    </div>

    <script>
        // CONFIG SUPABASE (GANTI DENGAN PUNYA KAMU)
        const SB_URL = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                Swal.fire('Gagal!', error.message, 'error');
            } else {
                Swal.fire('Berhasil!', 'Selamat datang di Dashboard', 'success');
                location.reload();
            }
        }

        function showModal(id) { document.getElementById(id + 'Modal').classList.remove('hidden'); }
        function closeModal() { document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden')); }

        // Logic untuk mendeteksi user login
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                // User login, tampilkan menu logout dan dashboard
                document.getElementById('navItems').innerHTML = `<button onclick="handleLogout()" class="text-red-500 font-bold">Logout</button>`;
            }
        }
        
        checkUser();
    </script>
</body>
</html>
