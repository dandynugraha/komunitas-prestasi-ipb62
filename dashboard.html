<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Anggota Komprestasi</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #1e1b4b, #6d28d9, #9333ea);
        }

        .sidebar {
            width: 260px;
        }

        .nav-item {
            padding: 10px 16px;
            font-size: 13px;
        }

        .active-link {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
    </style>
</head>

<body class="flex min-h-screen text-white">

<!-- SIDEBAR -->
<aside class="sidebar bg-white/10 backdrop-blur-lg border-r border-white/10 flex flex-col fixed h-full">

    <!-- HEADER -->
    <div class="p-6">
        <h1 class="text-lg font-bold italic leading-tight">
            Grow<br>
            Inspire<br>
            Excellence
        </h1>
    </div>

    <!-- MENU -->
    <nav class="flex-1 px-3 space-y-1 overflow-y-auto">

        <button onclick="loadPage('home-dashboard.html', this)" 
            class="nav-item w-full text-left rounded-lg text-white font-semibold active-link hover:bg-white/10">
            Dashboard
        </button>

        <button onclick="loadPage('upload-prestasi.html', this)" 
            class="nav-item w-full text-left rounded-lg text-white/80 hover:bg-white/10">
            Upload Prestasi
        </button>

        <button onclick="loadPage('upload-proyek.html', this)" 
            class="nav-item w-full text-left rounded-lg text-white/80 hover:bg-white/10">
            Upload Proyek
        </button>

        <button onclick="loadPage('lomba-saya.html', this)" 
            class="nav-item w-full text-left rounded-lg text-white/80 hover:bg-white/10">
            Lomba Saya
        </button>

        <button onclick="loadPage('event-saya.html', this)" 
            class="nav-item w-full text-left rounded-lg text-white/80 hover:bg-white/10">
            Event Saya
        </button>

        <button onclick="loadPage('my-plan.html', this)" 
            class="nav-item w-full text-left rounded-lg text-white/80 hover:bg-white/10">
            My Plan
        </button>

    </nav>

    <!-- LOGOUT -->
    <div class="p-4 border-t border-white/10">
        <button onclick="logout()" 
            class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-bold transition">
            Logout
        </button>
    </div>

</aside>

<!-- CONTENT -->
<main id="mainContent" class="flex-1 ml-[260px] p-6">

    <h1 class="text-2xl font-bold">Welcome 👋</h1>
    <p class="text-white/70 mt-2">Selamat datang di dashboard Aksara Karya</p>

    <div class="grid grid-cols-3 gap-4 mt-6">

        <div class="bg-white/10 backdrop-blur-lg p-5 rounded-xl shadow-lg">
            <h3 class="text-sm text-white/70">Total Prestasi</h3>
            <p class="text-3xl font-bold mt-2">10</p>
        </div>

        <div class="bg-white/10 backdrop-blur-lg p-5 rounded-xl shadow-lg">
            <h3 class="text-sm text-white/70">Event Diikuti</h3>
            <p class="text-3xl font-bold mt-2">5</p>
        </div>

        <div class="bg-white/10 backdrop-blur-lg p-5 rounded-xl shadow-lg">
            <h3 class="text-sm text-white/70">Project Aktif</h3>
            <p class="text-3xl font-bold mt-2">2</p>
        </div>

    </div>

</main>

<!-- SCRIPT -->
<script>
function loadPage(page, el) {

    document.getElementById("mainContent").innerHTML = "<p>Loading...</p>";

    fetch(page)
        .then(res => res.text())
        .then(data => {
            document.getElementById("mainContent").innerHTML = data;
        })
        .catch(() => {
            document.getElementById("mainContent").innerHTML = "<p>Halaman tidak ditemukan ❌</p>";
        });

    document.querySelectorAll(".nav-item").forEach(btn => {
        btn.classList.remove("active-link");
    });

    el.classList.add("active-link");
}

window.onload = () => {
    loadPage('home-dashboard.html', document.querySelector('.nav-item'));
};

function logout() {
    if (confirm("Yakin mau logout?")) {
        localStorage.clear();
        window.location.href = "index.html";
    }
}
</script>

</body>
</html>
