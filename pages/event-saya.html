<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body class="p-6 md:p-10 text-white">

<div class="max-w-5xl mx-auto animate-[fadeIn_.4s_ease]">

    <!-- HEADER -->
    <div class="mb-6">
        <h2 class="text-3xl font-extrabold flex items-center gap-2">
            📅 Event & Mentoring
        </h2>
        <p class="text-white/80 text-sm mt-1">
            Ikuti kegiatan cluster dan tingkatkan peluang prestasi 🚀
        </p>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- CARD -->
        <div class="bg-white/95 backdrop-blur-xl text-gray-800 rounded-2xl overflow-hidden shadow-2xl border border-white/20">

            <!-- IMAGE -->
            <div class="relative">
                <img src="https://via.placeholder.com/600x400" class="w-full h-56 object-cover">

                <span class="absolute top-3 left-3 bg-purple-600 text-white text-[10px] font-bold px-3 py-1 rounded-full">
                    Mentoring
                </span>
            </div>

            <!-- CONTENT -->
            <div class="p-6">

                <h3 class="text-lg font-bold text-gray-800">
                    Optimalisasi UI/UX dalam Lomba Desain
                </h3>

                <p class="text-sm text-gray-500 mt-2">
                    Bersama mentor profesional, kupas strategi menang lomba desain 🎯
                </p>

                <!-- INFO -->
                <div class="mt-4 space-y-2 text-sm">

                    <p class="flex items-center gap-2 text-gray-600">
                        ⏰ <span>19 Maret 2024 • 19.30 WIB</span>
                    </p>

                    <p class="flex items-center gap-2 text-gray-600">
                        💻 <span>Zoom Meeting</span>
                    </p>

                </div>

                <!-- BUTTON -->
                <div class="mt-6 flex flex-col gap-3">

                    <button onclick="confirmEvent('Hadir')" 
                        class="w-full bg-gradient-to-r from-purple-600 to-purple-700 
                        text-white py-3 rounded-xl font-bold 
                        hover:scale-[1.02] active:scale-95 transition">

                        ✔ Hadir
                    </button>

                    <button onclick="showAbsenReason()" 
                        class="w-full bg-gray-100 text-gray-600 py-3 rounded-xl font-semibold 
                        hover:bg-gray-200 transition">

                        ❌ Tidak Hadir
                    </button>

                </div>

                <!-- ABSEN -->
                <div id="reason-box" class="mt-4 hidden">

                    <textarea id="alasan" 
                        placeholder="Tulis alasan tidak hadir..."
                        class="w-full p-3 bg-red-50 border border-red-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-400">
                    </textarea>

                    <button onclick="confirmEvent('Absen')" 
                        class="mt-2 text-red-500 font-bold text-sm hover:underline">

                        Kirim ke Staff HEG
                    </button>

                </div>

            </div>
        </div>

    </div>

</div>

<script>
function showAbsenReason() {
    document.getElementById('reason-box').classList.toggle('hidden');
}

function confirmEvent(status) {
    const alasan = document.getElementById("alasan").value;

    if (status === "Absen" && !alasan.trim()) {
        alert("Isi alasan dulu!");
        return;
    }

    alert(`🔥 Status [${status}] berhasil dikirim!`);
}
</script>

</body>
</html>
