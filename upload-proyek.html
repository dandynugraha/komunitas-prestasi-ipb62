<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="p-10 bg-[#F8FAFC]">
    <div class="max-w-4xl bg-white p-10 rounded-[3rem] shadow-sm border border-purple-100">
        <h2 class="text-2xl font-black text-purple-900 mb-8">🚀 Buat Proyek Kolaborasi</h2>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nama Proyek</label>
                <input id="p-name" placeholder="Misal: IPB Makan" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Struktur Anggota (Nama - Role)</label>
                <textarea id="p-struct" placeholder="Dandy - Ketua&#10;Ucok - Designer" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 h-28 outline-none resize-none"></textarea>
            </div>
            
            <div class="p-6 bg-purple-50 rounded-[2rem] space-y-4">
                <p class="font-bold text-purple-700 italic text-sm">Target & Timeline (Persentase akan terbagi otomatis)</p>
                <div id="timeline-list" class="space-y-3">
                    <input placeholder="Timeline 1: Riset Pasar" class="t-item w-full p-4 rounded-xl border-none shadow-sm">
                </div>
                <button onclick="addRow()" class="text-purple-600 font-bold text-sm px-2 hover:underline">+ Tambah Tahapan Proyek</button>
            </div>
        </div>

        <button onclick="calculateProgress()" class="w-full mt-8 bg-purple-600 text-white p-5 rounded-2xl font-black shadow-lg shadow-purple-100 transition hover:scale-[1.02]">
            SIMPAN & PUBLISH PROYEK
        </button>
    </div>

    <script>
        function addRow() {
            const container = document.getElementById('timeline-list');
            const input = document.createElement('input');
            input.className = "t-item w-full p-4 rounded-xl border-none shadow-sm mt-2";
            input.placeholder = "Timeline selanjutnya...";
            container.appendChild(input);
        }

        function calculateProgress() {
            const items = document.querySelectorAll('.t-item');
            const total = items.length;
            const weight = (100 / total).toFixed(1);
            alert(`Proyek Berhasil Disimpan!\nSetiap tahapan yang selesai akan menambah progres sebesar ${weight}%`);
        }
    </script>
</body>
</html>
