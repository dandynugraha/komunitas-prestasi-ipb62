<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Anggota Komprestasi</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .sidebar {
            width: 260px;
        }

        .nav-item {
            padding: 10px 16px;
            font-size: 13px;
        }

        .active-link {
            background-color: #EFF6FF;
            color: #2563EB;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] flex min-h-screen">

<!-- SIDEBAR -->
<aside class="sidebar bg-white border-r border-gray-100 flex flex-col fixed h-full">

    <!-- HEADER -->
    <div class="p-6 flex items-center space-x-3">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
            <i class="fa-solid fa-feather-pointed"></i>
        </div>
        <h1 class="text-lg font-black text-blue-900">AK62</h1>
    </div>

    <!-- MENU -->
    <nav class="flex-1 px-3 space-y-1 overflow-y-auto">

        <button onclick="loadPage('home-dashboard.html', this)" 
            class="nav-item w-full text-left rounded-xl text-gray-600 font-bold active-link">
            <i class="fa-solid fa-house mr-2"></i> Dashboard
        </button>

        <button onclick="loadPage('upload-prestasi.html', this)" 
            class="nav-item w-full text-left rounded-xl text-gray-600 font-bold">
            <i class="fa-solid fa-trophy mr-2"></i> Upload Prestasi
        </button>

        <button onclick="loadPage('upload-proyek.html', this)" 
            class="nav-item w-full text-left rounded-xl text-gray-600 font-bold">
            <i class="fa-solid fa-diagram-project mr-2"></i> Upload Proyek
        </button>

        <button onclick="loadPage('lomba-saya.html', this)" 
            class="nav-item w-full text-left rounded-xl text-gray-600 font-bold">
            <i class="fa-solid fa-flag mr-2"></i> Lomba Saya
        </button>

        <button onclick="loadPage('event-saya.html', this)" 
            class="nav-item w-full text-left rounded-xl text-gray-600 font-bold">
            <i class="fa-solid fa-calendar mr-2"></i> Event Saya
        </button>

        <button onclick="loadPage('my-plan.html', this)" 
            class="nav-item w-full text-left rounded-xl text-gray-600 font-bold">
            <i class="fa-solid fa-list mr-2"></i> My Plan
        </button>

    </nav>

    <!-- LOGOUT (INI YANG NEMPEL BAWAH) -->
    <div class="p-4 border-t">
        <button onclick="logout()" 
            class="w-full bg-red-500 text-white py-2 rounded-lg font-bold hover:bg-red-600 transition">
            <i class="fa-solid fa-right-from-bracket mr-2"></i> Logout
        </button>
    </div>

</aside>

<!-- CONTENT -->
<main id="mainContent" class="flex-1 ml-[260px] p-6">

    <!-- Default content -->
    <h1 class="text-2xl font-bold">Welcome 👋</h1>
    <p class="text-gray-500 mt-2">Selamat datang di dashboard AK62</p>

    <div class="grid grid-cols-3 gap-4 mt-6">

        <div class="bg-blue-500 text-white p-4 rounded-xl">
            <h3>Total Prestasi</h3>
            <p class="text-2xl font-bold">10</p>
        </div>

        <div class="bg-green-500 text-white p-4 rounded-xl">
            <h3>Event Diikuti</h3>
            <p class="text-2xl font-bold">5</p>
        </div>

        <div class="bg-yellow-500 text-white p-4 rounded-xl">
            <h3>Project Aktif</h3>
            <p class="text-2xl font-bold">2</p>
        </div>

    </div>

</main>

<!-- SCRIPT -->
<script>
function loadPage(page, el) {

    document.getElementById("mainContent").innerHTML = "<p>Loading...</p>";

    fetch(page)
        .then(res => res.text())
        .then(data => {
            document.getElementById("mainContent").innerHTML = data;
        })
        .catch(() => {
            document.getElementById("mainContent").innerHTML = "<p>Halaman tidak ditemukan ❌</p>";
        });

    document.querySelectorAll(".nav-item").forEach(btn => {
        btn.classList.remove("active-link");
    });

    el.classList.add("active-link");
}

// auto load pertama
window.onload = () => {
    loadPage('home-dashboard.html', document.querySelector('.nav-item'));
};

    function logout() {
    if (confirm("Yakin mau logout?")) {
        localStorage.clear();
        window.location.href = "index.html";
    }
}
</script>

</body>
</html>
