<!DOCTYPE html>

<body class="bg-slate-50 font-sans">

            <div id="navItems" class="space-x-4">

        </nav>

        <main class="max-w-6xl mx-auto p-6">
            <div id="homeView">
                <div class="bg-gradient-to-br from-blue-900 to-indigo-800 text-white p-10 rounded-3xl mb-10 relative overflow-hidden">
                    <div class="relative z-10">

                    <div class="absolute -right-10 -bottom-10 w-64 h-64 bg-white opacity-5 rounded-full"></div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

                        <div id="achievementList" class="grid grid-cols-1 gap-4">

                    <div class="bg-white p-6 rounded-3xl shadow-sm h-fit">

    <div id="loginModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center backdrop-blur-sm z-50">

            <input type="email" id="email" placeholder="Email IPB" class="w-full mb-3 p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Kode Anggota" class="w-full mb-6 p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-bold shadow-xl shadow-blue-200">MASUK</button>
            <button onclick="closeModal()" class="w-full mt-4 text-slate-400 text-sm">Tutup</button>
        </div>
    </div>

    <script>
        // Ganti fungsi loadWidgets yang lama dengan ini
function loadWidgets() {
    const widgets = document.getElementById('dynamicWidgets');
    widgets.innerHTML = ""; 

    if (currentUser.role.includes('member')) {
        // --- WIDGET UPLOAD PRESTASI ---
        widgets.innerHTML += `
            <div class="p-6 bg-white rounded-3xl shadow-sm border border-slate-100">
                <h4 class="font-bold mb-4 flex items-center gap-2">Upload Prestasi</h4>
                <div class="space-y-3">
                    <input type="text" id="presTitle" placeholder="Nama Lomba" class="w-full p-3 bg-slate-50 rounded-xl border-none text-sm">
                    <select id="presLevel" class="w-full p-3 bg-slate-50 rounded-xl border-none text-sm">
                        <option>Internasional</option>
                        <option>Nasional</option>
                        <option>Provinsi</option>
                        <option>Univ/Internal</option>
                    </select>
                    <input type="text" id="presRank" placeholder="Juara Berapa? (Contoh: Juara 1)" class="w-full p-3 bg-slate-50 rounded-xl border-none text-sm">
                    <textarea id="presStory" placeholder="Story telling singkat..." class="w-full p-3 bg-slate-50 rounded-xl border-none text-sm h-20"></textarea>
                    <button onclick="submitPrestasi()" class="w-full bg-orange-500 text-white p-3 rounded-xl font-bold text-sm">SUBMIT PRESTASI</button>
                </div>
            </div>
        `;

        // --- WIDGET PROGRES PROYEK (100/N Logic) ---
        widgets.innerHTML += `
            <div class="p-6 bg-white rounded-3xl shadow-sm border border-slate-100">
                <h4 class="font-bold mb-4 flex items-center gap-2">🚀 Proyek: <span id="projName">IPB Makan</span></h4>
                <div id="timelineList" class="space-y-3 mb-4 text-sm">
                    </div>
                <div class="pt-4 border-t">
                    <div class="flex justify-between text-xs font-bold mb-2">
                        <span>TOTAL PROGRESS</span>
                        <span id="percentText">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-green-500 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        `;
        renderTimeline(8); // Contoh 8 milestone seperti request-mu
    }
}

// --- LOGIKA SUBMIT PRESTASI ---
async function submitPrestasi() {
    const title = document.getElementById('presTitle').value;
    const level = document.getElementById('presLevel').value;
    const rank = document.getElementById('presRank').value;
    const story = document.getElementById('presStory').value;

    const { data, error } = await supabase
        .from('achievements')
        .insert([
            { 
                user_id: currentUser.id, 
                title: title, 
                level: level, 
                rank: rank, 
                story: story,
                category: currentUser.cluster 
            }
        ]);

    if (!error) {
        Swal.fire('Berhasil!', 'Prestasi kamu sudah masuk ke leaderboard.', 'success');
        // Kosongkan form
        document.getElementById('presTitle').value = "";
    } else {
        Swal.fire('Gagal', error.message, 'error');
    }
}

// --- LOGIKA TIMELINE (100/N) ---
let completedCount = 0;
function renderTimeline(n) {
    const container = document.getElementById('timelineList');
    container.innerHTML = "";
    for (let i = 1; i <= n; i++) {
        container.innerHTML += `
            <div class="flex items-center gap-3">
                <input type="checkbox" onchange="updateProgress(this, ${n})" class="w-4 h-4 rounded text-blue-600">
                <span class="text-slate-600">Milestone ${i}</span>
            </div>
        `;
    }
}

function updateProgress(cb, total) {
    if (cb.checked) completedCount++;
    else completedCount--;

    const percentage = (completedCount / total) * 100;
    document.getElementById('progressBar').style.width = percentage + "%";
    document.getElementById('percentText').innerText = Math.round(percentage) + "%";
}

        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                Swal.fire('Gagal!', error.message, 'error');
            } else {
                Swal.fire('Berhasil!', 'Selamat datang di Dashboard', 'success');
                location.reload();
            }
        }

        function showModal(id) { document.getElementById(id + 'Modal').classList.remove('hidden'); }
        function closeModal() { document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden')); }

        // Logic untuk mendeteksi user login
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                // User login, tampilkan menu logout dan dashboard
                document.getElementById('navItems').innerHTML = `<button onclick="handleLogout()" class="text-red-500 font-bold">Logout</button>`;
            }
        }
        
        checkUser();
    </script>
</body>
</html>
