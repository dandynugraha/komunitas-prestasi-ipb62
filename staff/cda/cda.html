<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }

.card {
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 20px;
    color: #111;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.tab-btn {
    padding: 10px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    font-weight: bold;
}
.tab-btn.active {
    background: #facc15;
    color: black;
}
</style>
</head>

<body class="p-6 md:p-10 text-white bg-gradient-to-br from-purple-700 to-indigo-900">

<h2 class="text-3xl font-extrabold mb-6">🎯 CDA Control Panel</h2>

<div class="flex gap-3 mb-6">
    <button onclick="showTab('cluster', this)" class="tab-btn active">Cluster</button>
    <button onclick="showTab('design', this)" class="tab-btn">Design</button>
    <button onclick="showTab('event', this)" class="tab-btn">Event</button>
</div>

<!-- CLUSTER -->
<div id="clusterTab">
    <div id="clusterList"></div>
</div>

<!-- DETAIL -->
<div id="detailTab" class="hidden">
    <button onclick="back()" class="mb-4 bg-white/20 px-4 py-2 rounded">← Back</button>
    <div id="detail"></div>
</div>

<!-- DESIGN -->
<div id="designTab" class="hidden">
    <div class="card space-y-3">
        <input id="judul" placeholder="Judul" class="w-full p-3 border rounded">
        <input id="ilustrasi" placeholder="Ilustrasi" class="w-full p-3 border rounded">
        <textarea id="caption" placeholder="Caption" class="w-full p-3 border rounded"></textarea>

        <button onclick="submitDesign()"
            class="w-full bg-yellow-400 p-3 font-bold rounded">
            Kirim 🚀
        </button>
    </div>
</div>

<!-- EVENT -->
<div id="eventTab" class="hidden">
    <div class="card space-y-3">

        <input id="event_title" placeholder="Judul Event" class="w-full p-3 border rounded">
        <input id="event_image" placeholder="Link Poster" class="w-full p-3 border rounded">
        <textarea id="event_caption" placeholder="Deskripsi" class="w-full p-3 border rounded"></textarea>

        <select id="event_visibility" class="w-full p-3 border rounded">
            <option value="public">Public</option>
            <option value="cluster">Cluster Only</option>
        </select>

        <input id="event_gform" placeholder="Link GForm" class="w-full p-3 border rounded">

        <button onclick="submitEvent()"
            class="w-full bg-purple-600 text-white p-3 rounded font-bold">
            Publish 🚀
        </button>

    </div>
</div>

<script>
const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I";

// ✅ FIX SUPABASE
const { createClient } = supabase;
const _supabase = createClient(supabaseUrl, supabaseKey);

// NAV
function showTab(tab, el){
    ["clusterTab","designTab","eventTab","detailTab"].forEach(id=>{
        document.getElementById(id).classList.add("hidden");
    });

    document.getElementById(tab+"Tab").classList.remove("hidden");

    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
}

// LOAD CLUSTER
async function loadCluster(){

    const currentUser = JSON.parse(localStorage.getItem("user"));

    const { data, error } = await _supabase.from("profiles").select("*");

    console.log("DATA SUPABASE:", data);

    if(error){
        alert(error.message);
        return;
    }

    if(!data || data.length === 0){
        document.getElementById("clusterList").innerHTML = `
            <div class="card">⚠️ Data kosong / tidak terbaca</div>
        `;
        return;
    }

    // 🔥 HAPUS FILTER (BIAR SEMUA MUNCUL)
    const members = data;

    const map = {};

    members.forEach(u=>{
        const c = u.cluster || "Tanpa Cluster";

        if(!map[c]) map[c] = [];

        map[c].push({
            name: u.name || "Tanpa Nama",
            email: u.email || "-",
            points: u.points || 0
        });
    });

    document.getElementById("clusterList").innerHTML =
        Object.keys(map).map(c=>`
            <div class="card mb-4">
                <h3 class="font-bold mb-2">${c}</h3>

                ${map[c].map(u=>`
                    <div onclick="detail('${u.email}')"
                        class="flex justify-between p-2 hover:bg-gray-100 cursor-pointer rounded">
                        <span>${u.name}</span>
                        <span class="text-purple-600 font-bold">${u.points}</span>
                    </div>
                `).join("")}
            </div>
        `).join("");
}

// DETAIL
async function detail(email){

    document.getElementById("clusterTab").classList.add("hidden");
    document.getElementById("detailTab").classList.remove("hidden");

    const { data: prestasi } = await _supabase
        .from("prestasi")
        .select("*")
        .eq("email_user", email);

    document.getElementById("detail").innerHTML = `
        <div class="card">
            <h3 class="font-bold mb-2">Prestasi</h3>
            ${prestasi?.map(p=>`<p>- ${p.title}</p>`).join("") || "Kosong"}
        </div>
    `;
}

function back(){
    document.getElementById("detailTab").classList.add("hidden");
    document.getElementById("clusterTab").classList.remove("hidden");
}

// DESIGN
async function submitDesign(){
    alert("Design sent (dummy dulu)");
}

// EVENT
async function submitEvent(){

    const currentUser = JSON.parse(localStorage.getItem("user"));

    try{

        const { error } = await _supabase.from("events").insert([{
            title: document.getElementById("event_title").value,
            image: document.getElementById("event_image").value,
            caption: document.getElementById("event_caption").value,
            visibility: document.getElementById("event_visibility").value,
            gform: document.getElementById("event_gform").value,
            cluster_target: currentUser?.cluster,
            created_by: currentUser?.email
        }]);

        if(error) throw error;

        alert("🔥 Event berhasil!");

    }catch(err){
        console.error(err);
        alert("ERROR: " + err.message);
    }
}

// ✅ FIX LOAD
document.addEventListener("DOMContentLoaded", () => {
    loadCluster();
});
</script>

</body>
</html>
