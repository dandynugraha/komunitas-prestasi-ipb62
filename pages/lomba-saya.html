<div class="animate-fadeInUp" style="max-width:720px;">
    <div style="margin-bottom:24px;">
        <h2 style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--ak-gray-900);">🚩 Tracking Lomba</h2>
        <p style="color:var(--ak-gray-500);font-size:14px;margin-top:4px;">Data akan diteruskan ke PJ Cluster terkait</p>
    </div>

    <div class="card" style="padding:28px;">
        <h3 style="font-size:15px;font-weight:700;color:var(--ak-gray-700);margin-bottom:16px;">Informasi Kompetisi</h3>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group" style="grid-column:1/-1;">
                <label class="form-label">Nama Kompetisi</label>
                <input id="lb-nama" placeholder="Contoh: Business Plan Competition" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Penyelenggara</label>
                <input id="lb-penyelenggara" placeholder="Nama Universitas/Instansi" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Bidang / Cluster</label>
                <select id="lb-bidang" class="form-select">
                    <option>Bisnis</option><option>Desain</option><option>Penulisan</option><option>Olimpiade</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Tanggal Daftar</label>
                <input id="lb-tanggal" type="date" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Status Saat Ini</label>
                <select id="lb-status" class="form-select" style="background:var(--ak-purple);color:white;font-weight:600;">
                    <option>Peserta</option><option>Semifinalis</option><option>Finalis</option>
                </select>
            </div>
        </div>

        <button onclick="saveLomba()" id="lb-btn" class="btn btn-primary btn-lg btn-block" style="margin-top:8px;">
            🚀 Submit Tracking
        </button>
    </div>

    <!-- RIWAYAT -->
    <div class="card" style="margin-top:20px;">
        <div style="padding:20px 24px;border-bottom:1px solid var(--ak-gray-100);">
            <h3 style="font-size:16px;font-weight:700;">📋 Riwayat Lomba Saya</h3>
        </div>
        <div style="padding:0 24px;">
            <table class="table">
                <thead>
                    <tr><th>Nama Lomba</th><th>Bidang</th><th>Status</th><th>Tanggal</th></tr>
                </thead>
                <tbody id="lb-history">
                    <tr><td colspan="4" style="text-align:center;padding:24px;color:var(--ak-gray-400);">Memuat...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
(async function() {
    const user = getUser();
    if (!user) return;

    // Load history
    try {
        const { data } = await db.from('lomba_tracking').select('*').eq('email', user.email).order('created_at', { ascending: false });
        const tbody = document.getElementById('lb-history');
        if (data && data.length > 0) {
            tbody.innerHTML = data.map(l => `
                <tr>
                    <td><b>${l.nama_lomba}</b><br><span style="font-size:12px;color:var(--ak-gray-400);">${l.penyelenggara || ''}</span></td>
                    <td>${getClusterBadge(l.bidang)}</td>
                    <td><span class="badge badge-purple">${l.status}</span></td>
                    <td style="font-size:13px;">${formatDate(l.tanggal_daftar)}</td>
                </tr>
            `).join('');
        } else {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--ak-gray-400);">Belum ada tracking lomba.</td></tr>';
        }
    } catch(e) {}
})();

async function saveLomba() {
    const user = getUser();
    if (!user) return showToast("Login dulu!", "error");

    const nama = document.getElementById('lb-nama').value.trim();
    const penyelenggara = document.getElementById('lb-penyelenggara').value.trim();
    const tanggal = document.getElementById('lb-tanggal').value;

    if (!nama || !penyelenggara || !tanggal) return showToast("Isi semua data!", "warning");

    setLoading("lb-btn", true);
    try {
        await db.from('lomba_tracking').insert([{
            nama_lomba: nama,
            penyelenggara,
            bidang: document.getElementById('lb-bidang').value,
            tanggal_daftar: tanggal,
            status: document.getElementById('lb-status').value,
            email: user.email,
            member_name: user.name || user.full_name
        }]);

        showToast(`Tracking berhasil dikirim ke PJ ${document.getElementById('lb-bidang').value}! 🔥`, "success");
        // Reload page
        loadPage('pages/lomba-saya.html','Lomba Saya',document.querySelector('.menu-item.active'));
    } catch(err) {
        showToast("Error: " + err.message, "error");
    } finally {
        setLoading("lb-btn", false);
    }
}
</script>
