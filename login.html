<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aksara Karya 62</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border-4 border-white/20">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-800 tracking-tighter uppercase">Aksara Karya</h1>
            <p class="text-gray-500 text-sm mt-1 font-medium">Portal Internal Staf & Anggota</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest ml-1 mb-1">Email</label>
                <input id="email" type="email" placeholder="nama@apps.ipb.ac.id" 
                    class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition font-medium">
            </div>

            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest ml-1 mb-1">Password</label>
                <input id="password" type="password" placeholder="••••••••" 
                    class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition font-medium">
            </div>

            <button onclick="handleLogin()" id="btnLogin"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black p-5 rounded-2xl shadow-xl shadow-blue-200 transition active:scale-95 uppercase mt-2">
                Masuk Sekarang
            </button>

            <p id="errorMsg" class="text-center text-red-500 font-bold text-sm mt-2 min-h-[20px]"></p>
        </div>
    </div>

    <script>
        // CONFIG SUPABASE
        const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
        const supabaseKey = "GANTI_DENGAN_ANON_KEY_KAMU"; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function handleLogin() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const btn = document.getElementById("btnLogin");
            const errorMsg = document.getElementById("errorMsg");

            if (!email || !password) {
                errorMsg.innerText = "Email & password harus diisi!";
                return;
            }

            btn.innerText = "MEMVALIDASI...";
            btn.disabled = true;
            errorMsg.innerText = "";

            try {
                // MENCARI DI TABEL 'profiles'
                const { data, error } = await _supabase
                    .from("profiles") // <--- Nama tabel sudah diganti ke 'profiles'
                    .select("*")
                    .eq("email", email)
                    .eq("password", password);

                if (error) throw error;

                if (data && data.length > 0) {
                    const userAccount = data[0];
                    localStorage.setItem("user", JSON.stringify(userAccount));
                    
                    // Logika Redirect berdasarkan kolom 'role' di tabel profiles
                    const role = (userAccount.role || "").toLowerCase();

                    if(role.includes("cda")) window.location.href = "dashboard-cda.html";
                    else if(role.includes("mbd")) window.location.href = "dashboard-mbd.html";
                    else if(role.includes("heg")) window.location.href = "dashboard-heg.html";
                    else if(role.includes("bph")) window.location.href = "dashboard-bph.html";
                    else window.location.href = "dashboard.html";

                } else {
                    errorMsg.innerText = "Akun tidak ditemukan atau password salah.";
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "Error: " + err.message;
            } finally {
                btn.innerText = "Masuk Sekarang";
                btn.disabled = false;
            }
        }

        document.addEventListener("keypress", (e) => { if (e.key === "Enter") handleLogin(); });
    </script>
</body>
</html>
