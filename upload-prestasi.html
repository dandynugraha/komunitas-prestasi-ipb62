<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Upload Prestasi - AK62</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="p-10 bg-[#F8FAFC]">
    <div class="max-w-4xl bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100 mx-auto">
        <h2 class="text-2xl font-black text-blue-900 mb-8"><i class="fa-solid fa-trophy mr-3"></i> Lapor Prestasi Baru</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <input id="foto" placeholder="Link Foto Landscape (Bukti URL)" class="md:col-span-2 p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100 focus:ring-2 focus:ring-blue-500">
            <input id="tanggal" type="date" class="p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100">

            <select id="title" class="p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100 font-bold">
                <option value="Juara 1">Juara 1</option>
                <option value="Juara 2">Juara 2</option>
                <option value="Juara 3">Juara 3</option>
                <option value="Harapan 1">Harapan 1</option>
                <option value="Harapan 2">Harapan 2</option>
                <option value="Harapan 3">Harapan 3</option>
                <option value="Honorable Mention">Honorable Mention</option>
                <option value="Finalis">Finalis / Peserta</option>
            </select>
            
            <select id="tingkat" class="p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100 font-bold">
                <option value="Internasional">Internasional</option>
                <option value="Nasional">Nasional</option>
                <option value="Provinsi">Provinsi</option>
                <option value="Universitas">Universitas</option>
            </select>

            <select id="metode" onchange="updatePlaceholder()" class="p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100">
                <option value="offline">Offline</option>
                <option value="online">Online</option>
                <option value="hybrid">Hybrid</option>
            </select>

            <input id="lokasi" placeholder="Nama Tempat" class="md:col-span-2 p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100">
            
            <select id="cluster_lomba" class="md:col-span-2 p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100 font-bold text-blue-600">
                <option value="">-- Pilih Bidang/Cluster Lomba --</option>
                <option>Bisnis</option>
                <option>Desain</option>
                <option>Kepenulisan</option>
                <option>Olimpiade</option>
            </select>

            <textarea id="story" placeholder="Story Telling (Ceritakan pengalamanmu...)" class="md:col-span-2 h-40 p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100 resize-none"></textarea>
        </div>

        <button onclick="uploadPrestasi()" id="btnUpload" class="w-full mt-8 bg-blue-600 text-white p-5 rounded-2xl font-black shadow-lg shadow-blue-100 transition hover:scale-[1.02] active:scale-95">
            Upload & Publish ke Home
        </button>
    </div>

    <script>
        const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I"; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 1. FUNGSI HITUNG POIN (LOGIKA SISTEM POIN)
        function getPoints(tingkat, juara) {
            const skor = {
                'Internasional': { 'Juara 1': 500, 'Juara 2': 400, 'Juara 3': 300, 'Lainnya': 150 },
                'Nasional':      { 'Juara 1': 300, 'Juara 2': 200, 'Juara 3': 150, 'Lainnya': 75 },
                'Provinsi':      { 'Juara 1': 150, 'Juara 2': 100, 'Juara 3': 75,  'Lainnya': 40 },
                'Universitas':   { 'Juara 1': 100, 'Juara 2': 75,  'Juara 3': 50,  'Lainnya': 20 }
            };

            let kategoriJuara = juara.includes('Juara') ? juara : 'Lainnya';
            return skor[tingkat][kategoriJuara] || 10;
        }

        function updatePlaceholder() {
            const m = document.getElementById('metode').value;
            const l = document.getElementById('lokasi');
            l.placeholder = (m === 'online') ? "Platform (Zoom/Gmeet/Behance)" : "Nama Tempat/Kota";
        }

        async function uploadPrestasi() {
            const user = JSON.parse(localStorage.getItem("user"));
            if(!user) return alert("Sesi berakhir, silakan login kembali.");

            const btn = document.getElementById('btnUpload');
            const tingkat = document.getElementById('tingkat').value;
            const juara = document.getElementById('title').value;
            
            // Hitung poin yang didapat
            const pointsEarned = getPoints(tingkat, juara);

            const data = {
                title: juara,
                foto_url: document.getElementById('foto').value,
                tanggal: document.getElementById('tanggal').value,
                tingkat: tingkat,
                metode: document.getElementById('metode').value,
                lokasi: document.getElementById('lokasi').value,
                cluster: document.getElementById('cluster_lomba').value,
                story: document.getElementById('story').value,
                email_user: user.email,
                nama_user: user.name || user.email,
                points_given: pointsEarned // Simpan riwayat poin di tabel prestasi
            };

            if(!data.cluster) return alert("Harap pilih Cluster Lomba!");

            btn.innerText = `Menghitung +${pointsEarned} Poin...`;
            btn.disabled = true;

            try {
                // A. Insert ke tabel prestasi
                const { error: err1 } = await _supabase.from('prestasi').insert([data]);
                if(err1) throw err1;

                // B. Update total poin di profil user
                const currentPoints = parseInt(user.points || 0);
                const newTotal = currentPoints + pointsEarned;

                const { error: err2 } = await _supabase
                    .from('profiles')
                    .update({ points: newTotal })
                    .eq('email', user.email);

                if(err2) throw err2;

                // C. Update Local Storage agar dashboard lokal juga terupdate
                user.points = newTotal;
                localStorage.setItem("user", JSON.stringify(user));

                alert(`🎉 Berhasil! Kamu mendapatkan +${pointsEarned} Poin dan prestasi telah dipublish!`);
                window.location.reload();

            } catch (err) {
                alert("Terjadi kesalahan: " + err.message);
                console.error(err);
            } finally {
                btn.innerText = "Upload & Publish ke Home";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
