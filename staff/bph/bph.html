<div class="animate-fadeInUp">
    <div style="margin-bottom:24px;">
        <h2 style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--ak-gray-900);">👑 BPH Panel</h2>
        <p style="color:var(--ak-gray-500);font-size:14px;margin-top:4px;">Monitoring seluruh aktivitas anggota & staff</p>
    </div>

    <!-- STATS -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;" class="stagger">
        <div class="card" style="padding:20px;text-align:center;">
            <div style="font-size:11px;color:var(--ak-gray-400);font-weight:600;text-transform:uppercase;">Total Anggota</div>
            <div id="bph-members" style="font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--ak-purple);">0</div>
        </div>
        <div class="card" style="padding:20px;text-align:center;">
            <div style="font-size:11px;color:var(--ak-gray-400);font-weight:600;text-transform:uppercase;">Total Prestasi</div>
            <div id="bph-prestasi" style="font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--ak-gold);">0</div>
        </div>
        <div class="card" style="padding:20px;text-align:center;">
            <div style="font-size:11px;color:var(--ak-gray-400);font-weight:600;text-transform:uppercase;">Total Proyek</div>
            <div id="bph-projects" style="font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--ak-success);">0</div>
        </div>
        <div class="card" style="padding:20px;text-align:center;">
            <div style="font-size:11px;color:var(--ak-gray-400);font-weight:600;text-transform:uppercase;">Lomba Tracking</div>
            <div id="bph-lomba" style="font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--ak-info);">0</div>
        </div>
    </div>

    <!-- ACTIVITY FEED -->
    <div class="card">
        <div style="padding:20px 24px;border-bottom:1px solid var(--ak-gray-100);">
            <h3 style="font-size:16px;font-weight:700;">📋 Feed Aktivitas Terbaru</h3>
        </div>
        <div id="bph-feed" style="padding:16px 24px;max-height:500px;overflow-y:auto;">
            <p style="text-align:center;color:var(--ak-gray-400);padding:24px;">Memuat data...</p>
        </div>
    </div>
</div>

<script>
(async function() {
    try {
        // Counts
        const [members, prestasi, projects, lomba] = await Promise.all([
            db.from('profiles').select('*', { count: 'exact', head: true }),
            db.from('prestasi').select('*', { count: 'exact', head: true }),
            db.from('projects').select('*', { count: 'exact', head: true }),
            db.from('lomba_tracking').select('*', { count: 'exact', head: true })
        ]);
        document.getElementById('bph-members').textContent = members.count || 0;
        document.getElementById('bph-prestasi').textContent = prestasi.count || 0;
        document.getElementById('bph-projects').textContent = projects.count || 0;
        document.getElementById('bph-lomba').textContent = lomba.count || 0;

        // Activity Feed (combine recent prestasi + lomba)
        const { data: recentPrestasi } = await db.from('prestasi').select('*').order('created_at', { ascending: false }).limit(10);
        const { data: recentLomba } = await db.from('lomba_tracking').select('*').order('created_at', { ascending: false }).limit(10);

        const feed = [];
        (recentPrestasi || []).forEach(p => feed.push({
            type: '🏆', text: `${p.member_name || p.email_user} upload prestasi: ${p.title}`,
            detail: `${p.tingkat || ''} • ${p.cluster || ''}`, time: p.created_at
        }));
        (recentLomba || []).forEach(l => feed.push({
            type: '🚩', text: `${l.member_name || l.email} tracking lomba: ${l.nama_lomba}`,
            detail: `${l.bidang} • ${l.status}`, time: l.created_at
        }));
        feed.sort((a, b) => new Date(b.time) - new Date(a.time));

        const feedBox = document.getElementById('bph-feed');
        if (feed.length > 0) {
            feedBox.innerHTML = feed.map(f => `
                <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--ak-gray-50);">
                    <div style="font-size:20px;">${f.type}</div>
                    <div style="flex:1;">
                        <div style="font-size:14px;font-weight:500;color:var(--ak-gray-700);">${f.text}</div>
                        <div style="font-size:12px;color:var(--ak-gray-400);margin-top:2px;">${f.detail} • ${timeAgo(f.time)}</div>
                    </div>
                </div>
            `).join('');
        } else {
            feedBox.innerHTML = '<p style="text-align:center;color:var(--ak-gray-400);padding:24px;">Belum ada aktivitas.</p>';
        }
    } catch(e) { console.log("BPH:", e); }
})();
</script>
