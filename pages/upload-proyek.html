<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body class="p-6 md:p-10 text-white">

<div class="max-w-4xl mx-auto animate-[fadeIn_.4s_ease]">

    <!-- HEADER -->
    <h2 class="text-3xl font-extrabold mb-1 flex items-center gap-2">
        🚀 Buat Proyek Kolaborasi
    </h2>
    <p class="text-white/80 mb-6">
        Bangun tim, susun timeline, dan capai target bersama 🎯
    </p>

    <!-- CARD -->
    <div class="bg-white/95 backdrop-blur-xl text-gray-800 p-6 md:p-8 rounded-2xl shadow-2xl border border-white/20">

        <!-- INPUT -->
        <div class="space-y-6">

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nama Proyek</label>
                <input id="p-name" placeholder="Misal: IPB Makan"
                    class="w-full p-4 bg-gray-100 rounded-xl border border-gray-200 
                    focus:ring-2 focus:ring-purple-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Struktur Anggota</label>
                <textarea id="p-struct" placeholder="Dandy - Ketua&#10;Ucok - Designer"
                    class="w-full p-4 bg-gray-100 rounded-xl border border-gray-200 h-28 resize-none
                    focus:ring-2 focus:ring-purple-500 outline-none transition"></textarea>
            </div>

            <!-- TIMELINE -->
            <div class="p-6 bg-purple-50 rounded-2xl border border-purple-100">

                <div class="flex justify-between items-center mb-4">
                    <p class="font-bold text-purple-700">
                        Timeline Proyek
                    </p>

                    <button onclick="addRow()"
                        class="text-xs bg-purple-600 text-white px-3 py-1 rounded-lg hover:bg-purple-700 transition">
                        + Tambah
                    </button>
                </div>

                <p class="text-xs text-purple-500 mb-4 italic">
                    Progress akan terbagi otomatis dari jumlah tahapan
                </p>

                <!-- LIST -->
                <div id="timeline-list" class="space-y-3">

                    <div class="flex items-center gap-3 bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                        <span class="text-xs font-bold text-purple-600">1</span>
                        <input placeholder="Riset Pasar"
                            class="t-item flex-1 bg-transparent outline-none text-sm">
                        <button onclick="removeRow(this)" class="text-red-400 hover:text-red-600 text-sm">✕</button>
                    </div>

                </div>

            </div>

        </div>

        <!-- BUTTON -->
        <button onclick="calculateProgress()" 
            class="w-full mt-8 bg-gradient-to-r from-purple-600 to-purple-700 
            text-white p-5 rounded-xl font-bold shadow-lg 
            hover:scale-[1.02] active:scale-95 transition">

            🚀 Simpan & Publish
        </button>

    </div>
</div>

<script>

// TAMBAH ROW
function addRow() {
    const container = document.getElementById('timeline-list');
    const count = container.children.length + 1;

    const div = document.createElement('div');
    div.className = "flex items-center gap-3 bg-white p-3 rounded-xl shadow-sm border border-gray-100";

    div.innerHTML = `
        <span class="text-xs font-bold text-purple-600">${count}</span>
        <input placeholder="Tahapan ${count}" class="t-item flex-1 bg-transparent outline-none text-sm">
        <button onclick="removeRow(this)" class="text-red-400 hover:text-red-600 text-sm">✕</button>
    `;

    container.appendChild(div);
}

// HAPUS ROW
function removeRow(btn) {
    btn.parentElement.remove();
    reindex();
}

// RESET NOMOR
function reindex() {
    const rows = document.querySelectorAll('#timeline-list div');
    rows.forEach((row, i) => {
        row.querySelector("span").innerText = i + 1;
    });
}

// HITUNG PROGRESS
function calculateProgress() {
    const items = document.querySelectorAll('.t-item');
    const total = items.length;

    if (total === 0) {
        alert("Minimal 1 timeline!");
        return;
    }

    const weight = (100 / total).toFixed(1);

    alert(`🔥 Proyek berhasil dibuat!\nSetiap tahapan bernilai ${weight}% progress`);
}

</script>

</body>
</html>
