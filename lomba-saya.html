<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="p-10 bg-[#F8FAFC]">
    <div class="max-w-4xl bg-white p-10 rounded-[3rem] shadow-sm border border-gray-100">
        <div class="flex items-center justify-between mb-10">
            <div>
                <h2 class="text-3xl font-black text-gray-900">🚩 Tracking Lomba</h2>
                <p class="text-gray-500">Data ini akan diteruskan ke PJ Cluster terkait.</p>
            </div>
            <div class="w-16 h-16 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center text-2xl">
                <i class="fa-solid fa-map-location-dot"></i>
            </div>
        </div>

        <form id="lombaForm" class="grid grid-cols-2 gap-6">
            <div class="col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Nama Kompetisi</label>
                <input id="nama_lomba" placeholder="Contoh: Business Plan Competition UNHAS" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Penyelenggara</label>
                <input id="penyelenggara" placeholder="Nama Universitas/Instansi" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Bidang/Cluster</label>
                <select id="bidang" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 outline-none transition cursor-pointer">
                    <option>Bisnis</option>
                    <option>Desain</option>
                    <option>Penulisan</option>
                    <option>Olimpiade</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Tanggal Daftar</label>
                <input id="tanggal_daftar" type="date" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Status Saat Ini</label>
                <select id="status" class="w-full p-4 bg-orange-600 text-white rounded-2xl border-none outline-none font-bold transition cursor-pointer">
                    <option value="Peserta">Pendaftar/Peserta</option>
                    <option value="Semifinalis">Semifinalis</option>
                    <option value="Finalis">Finalis</option>
                </select>
            </div>
            <button type="button" onclick="saveLomba()" class="col-span-2 mt-4 bg-gray-900 text-white p-5 rounded-2xl font-black shadow-xl hover:bg-black transition active:scale-95">
                SUBMIT DATA TRACKING
            </button>
        </form>
    </div>

    <script>
        // Masukkan config Supabase kamu di sini
        async function saveLomba() {
            alert("Data berhasil dikirim ke PJ Cluster " + document.getElementById('bidang').value);
            // Tambahkan logika supabase.from('lomba_tracking').insert(...)
        }
    </script>
</body>
</html>
