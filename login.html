<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aksara Karya 62</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b, #6d28d9, #9333ea);
        }
            body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: linear-gradient(135deg, #1e1b4b, #6d28d9, #9333ea);
    }
        const { data, error } = await _supabase
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white/95 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md">

        <!-- HEADER -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight uppercase">
                Aksara Karya
            </h1>
            <p class="text-gray-500 text-sm mt-1">
                Portal Internal Staff & Anggota
            </p>
        </div>

        <!-- FORM -->
        <div class="space-y-4">

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">
                    Email
                </label>
                <input id="email" type="email" placeholder="nama@apps.ipb.ac.id" 
                    class="w-full p-3 bg-gray-100 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">
                    Password
                </label>
                <input id="password" type="password" placeholder="••••••••" 
                    class="w-full p-3 bg-gray-100 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition">
            </div>

            <button onclick="handleLogin()" id="btnLogin"
                class="w-full bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-500 hover:to-yellow-600 text-black font-bold py-3 rounded-lg shadow-md transition active:scale-95">
                Masuk Sekarang
            </button>

            <p id="errorMsg" class="text-center text-red-500 text-sm mt-2 min-h-[20px]"></p>

        </div>
    </div>

    <script>
        const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function handleLogin() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const btn = document.getElementById("btnLogin");
            const errorMsg = document.getElementById("errorMsg");

            if (!email || !password) {
                errorMsg.innerText = "Email & password harus diisi!";
                return;
            }

            btn.innerText = "MEMVALIDASI...";
            btn.disabled = true;
            errorMsg.innerText = "";

            try {
                const { data, error } = await _supabase
                    .from("profiles")
                    .select("*")
                    .eq("email", email)
                    .eq("password", password);

                if (error) throw error;

            if (data && data.length > 0) {
                let userAccount = data[0];
            
                // 🔥 default role kalau kosong
                if (!userAccount.role) {
                    userAccount.role = "member";
                }
            
                // simpan user
                localStorage.setItem("user", JSON.stringify(userAccount));
            
                // redirect
                window.location.href = "dashboard.html";
            
            } else {
                errorMsg.innerText = "Akun tidak ditemukan atau password salah.";
            }

            if (!userAccount.role) {
                userAccount.role = "member";
            }
                
            } catch (err) {
                errorMsg.innerText = "Error: " + err.message;
            } finally {
                btn.innerText = "Masuk Sekarang";
                btn.disabled = false;
            }
        }

        document.addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleLogin();
        });
    </script>

</body>
</html>
