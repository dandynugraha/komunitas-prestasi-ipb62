<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body class="p-6 md:p-10 text-white">

<div class="animate-[fadeIn_.4s_ease]">

    <!-- HEADER -->
    <header class="flex flex-col md:flex-row md:justify-between md:items-center gap-6 mb-8">

        <div>
            <h2 class="text-3xl font-extrabold">
                Halo, <span id="userName">User</span> 👋
            </h2>
            <p class="text-white/80 mt-1">
                Selamat datang kembali di Portal Aksara Karya 62 🚀
            </p>
        </div>

        <!-- POINT CARD -->
        <div class="bg-white/95 text-gray-800 px-6 py-5 rounded-2xl shadow-2xl flex items-center gap-4">
            <div class="bg-yellow-400 text-black p-3 rounded-xl text-lg shadow">
                ⭐
            </div>
            <div>
                <p class="text-xs font-semibold text-gray-500 uppercase">Total Poin</p>
                <p id="userPoints" class="text-2xl font-extrabold text-yellow-500">0 PTS</p>
            </div>
        </div>

    </header>

    <!-- STATS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

        <div class="bg-white/95 text-gray-800 p-5 rounded-2xl shadow-xl">
            <p class="text-sm text-gray-500">Total Prestasi</p>
            <p id="totalPrestasi" class="text-2xl font-bold">0</p>
        </div>

        <div class="bg-white/95 text-gray-800 p-5 rounded-2xl shadow-xl">
            <p class="text-sm text-gray-500">Total Plan</p>
            <p id="totalPlan" class="text-2xl font-bold">0</p>
        </div>

        <div class="bg-white/95 text-gray-800 p-5 rounded-2xl shadow-xl">
            <p class="text-sm text-gray-500">Aktivitas</p>
            <p class="text-2xl font-bold text-purple-600">Aktif</p>
        </div>

    </div>

    <!-- CONTENT -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- PRESTASI -->
        <div class="bg-white/95 text-gray-800 p-6 rounded-2xl shadow-2xl">

            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold flex items-center gap-2">
                    🏆 Riwayat Prestasi
                </h3>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <tbody id="myAchievementList">
                        <tr><td class="py-4 text-gray-400 italic">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>

        </div>

        <!-- PLAN -->
        <div class="bg-white/95 text-gray-800 p-6 rounded-2xl shadow-2xl">

            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                📅 Rencana Mendatang
            </h3>

            <div id="myPlanList" class="space-y-3">
                <p class="text-gray-400 italic">Memuat rencana...</p>
            </div>

        </div>

    </div>

</div>

<script>
const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I";
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

const user = JSON.parse(localStorage.getItem("user"));

async function loadDashboardData() {

    if (!user) return;

    document.getElementById('userName').innerText =
        user.full_name || user.name || "User";

    // POINT
    const { data: profile } = await _supabase
        .from('profiles')
        .select('points')
        .eq('email', user.email)
        .single();

    if (profile)
        document.getElementById('userPoints').innerText =
            `${profile.points || 0} PTS`;

    // PRESTASI
    const { data: prestasis } = await _supabase
        .from('prestasi')
        .select('*')
        .eq('email_user', user.email);

    document.getElementById('totalPrestasi').innerText =
        prestasis ? prestasis.length : 0;

    const prestList = document.getElementById('myAchievementList');

    if (prestasis && prestasis.length > 0) {
        prestList.innerHTML = prestasis.map(p => `
            <tr class="border-b last:border-0">
                <td class="py-3">
                    <p class="font-semibold">${p.title}</p>
                    <p class="text-xs text-gray-400">${p.tingkat} • ${p.cluster}</p>
                </td>
                <td class="py-3 text-right font-bold text-yellow-500">
                    +${p.points_given || 0}
                </td>
            </tr>
        `).join('');
    } else {
        prestList.innerHTML = "<tr><td class='py-4 text-gray-400'>Belum ada prestasi.</td></tr>";
    }

    // PLAN
    const { data: plans } = await _supabase
        .from('user_plans')
        .select('*')
        .eq('email', user.email);

    document.getElementById('totalPlan').innerText =
        plans ? plans.length : 0;

    const planBox = document.getElementById('myPlanList');

    if (plans && plans.length > 0) {
        planBox.innerHTML = plans.map(pl => `
            <div class="flex items-center p-3 bg-gray-50 rounded-xl border">
                <div class="bg-purple-600 text-white px-3 py-2 rounded-lg mr-3 text-center">
                    <p class="text-[10px] uppercase">
                        ${new Date(pl.tanggal).toLocaleString('id-ID', {month: 'short'})}
                    </p>
                    <p class="text-sm font-bold">
                        ${new Date(pl.tanggal).getDate()}
                    </p>
                </div>
                <p class="text-sm font-semibold">
                    ${pl.catatan}
                </p>
            </div>
        `).join('');
    } else {
        planBox.innerHTML = "<p class='text-gray-400 text-sm'>Belum ada rencana.</p>";
    }
}

loadDashboardData();
</script>

</body>
</html>
