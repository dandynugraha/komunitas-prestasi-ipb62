<div class="animate-fadeInUp">
    <div style="margin-bottom:24px;">
        <h2 style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--ak-gray-900);">📅 My Plan</h2>
        <p style="color:var(--ak-gray-500);font-size:14px;margin-top:4px;">Kelola rencana harianmu seperti Google Calendar</p>
    </div>

    <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">
        <!-- CALENDAR -->
        <div class="card" style="padding:24px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <button onclick="changeMonth(-1)" class="btn btn-ghost btn-sm"><i class="fa-solid fa-chevron-left"></i></button>
                <h3 id="mp-month" style="font-family:var(--font-display);font-size:18px;font-weight:700;"></h3>
                <button onclick="changeMonth(1)" class="btn btn-ghost btn-sm"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:8px;">
                <div style="font-size:11px;font-weight:700;color:var(--ak-gray-400);padding:8px 0;">MIN</div>
                <div style="font-size:11px;font-weight:700;color:var(--ak-gray-400);padding:8px 0;">SEN</div>
                <div style="font-size:11px;font-weight:700;color:var(--ak-gray-400);padding:8px 0;">SEL</div>
                <div style="font-size:11px;font-weight:700;color:var(--ak-gray-400);padding:8px 0;">RAB</div>
                <div style="font-size:11px;font-weight:700;color:var(--ak-gray-400);padding:8px 0;">KAM</div>
                <div style="font-size:11px;font-weight:700;color:var(--ak-gray-400);padding:8px 0;">JUM</div>
                <div style="font-size:11px;font-weight:700;color:var(--ak-gray-400);padding:8px 0;">SAB</div>
            </div>
            <div id="mp-calendar" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;"></div>
        </div>

        <!-- SIDEBAR -->
        <div class="card" style="padding:24px;">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">📌 Agenda</h3>
            <p id="mp-selected-date" style="font-size:13px;color:var(--ak-gray-400);margin-bottom:16px;">Pilih tanggal di kalender</p>
            <textarea id="mp-note" class="form-textarea" placeholder="Tulis rencana kamu..." style="min-height:80px;"></textarea>
            <button onclick="savePlan()" class="btn btn-primary btn-block" style="margin-top:12px;">Simpan</button>
            <div style="margin-top:20px;">
                <h4 style="font-size:13px;font-weight:700;margin-bottom:10px;">Agenda Hari Ini</h4>
                <div id="mp-list" style="display:flex;flex-direction:column;gap:8px;"></div>
            </div>
        </div>
    </div>
</div>

<style>
    .cal-day {
        height:56px; display:flex; flex-direction:column; align-items:center; justify-content:center;
        border-radius:var(--radius-sm); cursor:pointer; transition:all .15s; font-size:14px; font-weight:500;
        color:var(--ak-gray-700);
    }
    .cal-day:hover { background:rgba(109,40,217,.06); }
    .cal-day.today { border:2px solid var(--ak-purple); }
    .cal-day.selected { background:linear-gradient(135deg,var(--ak-purple),var(--ak-violet)); color:white; }
    .cal-dot { width:5px; height:5px; border-radius:50%; background:var(--ak-purple); margin-top:3px; }
    .cal-day.selected .cal-dot { background:var(--ak-gold-light); }
    @media (max-width:768px) {
        div[style*="grid-template-columns:2fr 1fr"] { grid-template-columns:1fr !important; }
    }
</style>

<script>
(function() {
    let current = new Date();
    let selected = null;
    let plans = {};
    const user = getUser();

    function formatKey(d) { return d.toISOString().split('T')[0]; }

    async function loadPlans() {
        if (!user) return;
        try {
            const { data } = await db.from('user_plans').select('*').eq('email', user.email);
            plans = {};
            (data || []).forEach(p => {
                if (!plans[p.tanggal]) plans[p.tanggal] = [];
                plans[p.tanggal].push(p.catatan);
            });
        } catch(e) {}
        renderCalendar();
    }

    function renderCalendar() {
        const cal = document.getElementById('mp-calendar');
        cal.innerHTML = '';
        const year = current.getFullYear(), month = current.getMonth();
        document.getElementById('mp-month').textContent = current.toLocaleString('id-ID', { month: 'long', year: 'numeric' });

        const firstDay = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();
        const todayKey = formatKey(new Date());

        for (let i = 0; i < firstDay; i++) {
            cal.innerHTML += '<div></div>';
        }

        for (let i = 1; i <= totalDays; i++) {
            const date = new Date(year, month, i);
            const key = formatKey(date);
            const isToday = key === todayKey;
            const isSelected = key === selected;
            const hasPlan = plans[key];

            const div = document.createElement('div');
            div.className = `cal-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}`;
            div.innerHTML = `<span>${i}</span>${hasPlan ? '<div class="cal-dot"></div>' : ''}`;
            div.onclick = () => selectDate(date);
            cal.appendChild(div);
        }
    }

    function selectDate(date) {
        selected = formatKey(date);
        document.getElementById('mp-selected-date').textContent = formatDateFull(selected);
        renderCalendar();
        renderList();
    }

    window.changeMonth = function(n) {
        current.setMonth(current.getMonth() + n);
        renderCalendar();
    };

    function renderList() {
        const box = document.getElementById('mp-list');
        if (!plans[selected] || plans[selected].length === 0) {
            box.innerHTML = '<p style="color:var(--ak-gray-400);font-size:13px;">Belum ada agenda</p>';
            return;
        }
        box.innerHTML = plans[selected].map(p => `
            <div style="background:rgba(109,40,217,.06);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;color:var(--ak-gray-700);">${p}</div>
        `).join('');
    }

    window.savePlan = async function() {
        const note = document.getElementById('mp-note').value.trim();
        if (!selected || !note) return showToast("Pilih tanggal dan isi catatan!", "warning");

        try {
            await db.from('user_plans').insert([{
                email: user.email, tanggal: selected, catatan: note
            }]);
            document.getElementById('mp-note').value = '';
            showToast("Agenda berhasil disimpan!", "success");
            await loadPlans();
            renderList();
        } catch(e) {
            showToast("Error: " + e.message, "error");
        }
    };

    setTimeout(() => loadPlans(), 100);
})();
</script>
