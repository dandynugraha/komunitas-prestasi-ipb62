<div class="animate-fadeInUp" style="max-width:720px;">
    <div style="margin-bottom:24px;">
        <h2 style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--ak-gray-900);">🚀 Buat Proyek Kolaborasi</h2>
        <p style="color:var(--ak-gray-500);font-size:14px;margin-top:4px;">Bangun tim, susun timeline, dan capai target bersama</p>
    </div>

    <div class="card" style="padding:28px;">
        <div class="form-group">
            <label class="form-label">Nama Proyek</label>
            <input id="pj-name" placeholder="Misal: IPB Makan" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">Deskripsi Proyek</label>
            <textarea id="pj-desc" class="form-textarea" placeholder="Tentang apa proyek ini, output dan manfaatnya..."></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Struktur Anggota</label>
            <textarea id="pj-struct" class="form-textarea" placeholder="Raffa - Ketua&#10;Ucok - Designer&#10;Budi - Backend Dev" style="min-height:80px;"></textarea>
        </div>

        <!-- TIMELINE -->
        <div style="background:rgba(109,40,217,.04);border:1px solid rgba(109,40,217,.1);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <div>
                    <div style="font-weight:700;color:var(--ak-purple);font-size:15px;">Timeline Proyek</div>
                    <div style="font-size:12px;color:var(--ak-gray-400);margin-top:2px;">Progress terbagi otomatis dari jumlah tahapan</div>
                </div>
                <button onclick="addTimeline()" class="btn btn-primary btn-sm">
                    <i class="fa-solid fa-plus"></i> Tambah
                </button>
            </div>
            <div id="pj-timeline" style="display:flex;flex-direction:column;gap:10px;">
                <div class="tl-row" style="display:flex;align-items:center;gap:10px;background:white;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--ak-gray-100);">
                    <span style="font-size:12px;font-weight:700;color:var(--ak-purple);min-width:20px;">1</span>
                    <input class="tl-input form-input" placeholder="Riset Pasar" style="padding:8px 12px;">
                    <button onclick="removeTimeline(this)" style="background:none;border:none;cursor:pointer;color:var(--ak-danger);font-size:16px;">✕</button>
                </div>
            </div>
        </div>

        <button onclick="saveProject()" id="pj-btn" class="btn btn-primary btn-lg btn-block">
            🚀 Simpan & Publish
        </button>
    </div>
</div>

<script>
function addTimeline() {
    const container = document.getElementById('pj-timeline');
    const count = container.children.length + 1;
    const div = document.createElement('div');
    div.className = 'tl-row';
    div.style.cssText = 'display:flex;align-items:center;gap:10px;background:white;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--ak-gray-100);animation:fadeInUp .3s ease;';
    div.innerHTML = `
        <span style="font-size:12px;font-weight:700;color:var(--ak-purple);min-width:20px;">${count}</span>
        <input class="tl-input form-input" placeholder="Tahapan ${count}" style="padding:8px 12px;">
        <button onclick="removeTimeline(this)" style="background:none;border:none;cursor:pointer;color:var(--ak-danger);font-size:16px;">✕</button>
    `;
    container.appendChild(div);
}

function removeTimeline(btn) {
    btn.closest('.tl-row').remove();
    document.querySelectorAll('#pj-timeline .tl-row').forEach((row, i) => {
        row.querySelector('span').textContent = i + 1;
    });
}

async function saveProject() {
    const user = getUser();
    if (!user) return showToast("Login dulu!", "error");

    const name = document.getElementById('pj-name').value.trim();
    if (!name) return showToast("Isi nama proyek!", "warning");

    const items = document.querySelectorAll('.tl-input');
    if (items.length === 0) return showToast("Minimal 1 timeline!", "warning");

    setLoading("pj-btn", true);
    try {
        await db.from("projects").insert([{
            title: name,
            description: document.getElementById('pj-desc').value,
            structure: document.getElementById('pj-struct').value,
            leader_name: user.name || user.full_name,
            leader_email: user.email,
            total_milestones: items.length,
            completed_milestones: 0
        }]);

        showToast(`Proyek "${name}" berhasil dibuat! Setiap tahapan = ${(100/items.length).toFixed(1)}%`, "success");
        setTimeout(() => loadPage('pages/home-dashboard.html','Dashboard',document.querySelector('.menu-item')), 1500);
    } catch(err) {
        showToast("Error: " + err.message, "error");
    } finally {
        setLoading("pj-btn", false);
    }
}
</script>
