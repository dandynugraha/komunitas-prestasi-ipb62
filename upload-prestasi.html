<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="p-6 md:p-10 text-white">

    <div class="max-w-4xl mx-auto">

        <!-- HEADER -->
        <h2 class="text-2xl md:text-3xl font-extrabold mb-6">
            🏆 Lapor Prestasi Baru
        </h2>

        <!-- CARD -->
        <div class="bg-white text-gray-800 p-6 md:p-8 rounded-xl shadow-md">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <!-- FOTO -->
                <input id="foto" placeholder="Link Foto (URL)"
                    class="md:col-span-2 p-3 bg-gray-100 rounded-lg border border-gray-200 focus:ring-2 focus:ring-purple-500 outline-none">

                <input id="tanggal" type="date"
                    class="p-3 bg-gray-100 rounded-lg border border-gray-200">

                <select id="title"
                    class="p-3 bg-gray-100 rounded-lg border border-gray-200 font-semibold">
                    <option value="Juara 1">Juara 1</option>
                    <option value="Juara 2">Juara 2</option>
                    <option value="Juara 3">Juara 3</option>
                    <option value="Harapan 1">Harapan 1</option>
                    <option value="Harapan 2">Harapan 2</option>
                    <option value="Harapan 3">Harapan 3</option>
                    <option value="Honorable Mention">Honorable Mention</option>
                    <option value="Finalis">Finalis / Peserta</option>
                </select>

                <select id="tingkat"
                    class="p-3 bg-gray-100 rounded-lg border border-gray-200 font-semibold">
                    <option value="Internasional">Internasional</option>
                    <option value="Nasional">Nasional</option>
                    <option value="Provinsi">Provinsi</option>
                    <option value="Universitas">Universitas</option>
                </select>

                <select id="metode" onchange="updatePlaceholder()"
                    class="p-3 bg-gray-100 rounded-lg border border-gray-200">
                    <option value="offline">Offline</option>
                    <option value="online">Online</option>
                    <option value="hybrid">Hybrid</option>
                </select>

                <input id="lokasi" placeholder="Nama Tempat"
                    class="md:col-span-2 p-3 bg-gray-100 rounded-lg border border-gray-200">

                <select id="cluster_lomba"
                    class="md:col-span-2 p-3 bg-gray-100 rounded-lg border border-gray-200 font-semibold text-purple-600">
                    <option value="">-- Pilih Cluster --</option>
                    <option>Bisnis</option>
                    <option>Desain</option>
                    <option>Kepenulisan</option>
                    <option>Olimpiade</option>
                </select>

                <textarea id="story" placeholder="Ceritakan pengalamanmu..."
                    class="md:col-span-2 h-32 p-3 bg-gray-100 rounded-lg border border-gray-200 resize-none"></textarea>

            </div>

            <!-- BUTTON -->
            <button onclick="uploadPrestasi()" id="btnUpload"
                class="w-full mt-6 bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-500 hover:to-yellow-600 text-black font-bold py-3 rounded-lg shadow-md transition active:scale-95">
                Upload & Publish 🚀
            </button>

        </div>

    </div>

    <script>
        const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function getPoints(tingkat, juara) {
            const skor = {
                'Internasional': { 'Juara 1': 500, 'Juara 2': 400, 'Juara 3': 300, 'Lainnya': 150 },
                'Nasional': { 'Juara 1': 300, 'Juara 2': 200, 'Juara 3': 150, 'Lainnya': 75 },
                'Provinsi': { 'Juara 1': 150, 'Juara 2': 100, 'Juara 3': 75, 'Lainnya': 40 },
                'Universitas': { 'Juara 1': 100, 'Juara 2': 75, 'Juara 3': 50, 'Lainnya': 20 }
            };

            let kategori = juara.includes('Juara') ? juara : 'Lainnya';
            return skor[tingkat][kategori] || 10;
        }

        function updatePlaceholder() {
            const m = document.getElementById('metode').value;
            document.getElementById('lokasi').placeholder =
                (m === 'online') ? "Platform (Zoom/Gmeet)" : "Nama Tempat";
        }

        async function uploadPrestasi() {
            const user = JSON.parse(localStorage.getItem("user"));
            if (!user) return alert("Login dulu!");

            const btn = document.getElementById('btnUpload');

            const tingkat = document.getElementById('tingkat').value;
            const juara = document.getElementById('title').value;
            const pointsEarned = getPoints(tingkat, juara);

            const data = {
                title: juara,
                foto_url: document.getElementById('foto').value,
                tanggal: document.getElementById('tanggal').value,
                tingkat,
                metode: document.getElementById('metode').value,
                lokasi: document.getElementById('lokasi').value,
                cluster: document.getElementById('cluster_lomba').value,
                story: document.getElementById('story').value,
                email_user: user.email,
                nama_user: user.name || user.email,
                points_given: pointsEarned
            };

            if (!data.cluster) return alert("Pilih cluster dulu!");

            btn.innerText = `+${pointsEarned} Poin...`;
            btn.disabled = true;

            try {
                await _supabase.from('prestasi').insert([data]);

                const newTotal = (user.points || 0) + pointsEarned;

                await _supabase
                    .from('profiles')
                    .update({ points: newTotal })
                    .eq('email', user.email);

                user.points = newTotal;
                localStorage.setItem("user", JSON.stringify(user));

                alert(`🔥 +${pointsEarned} poin berhasil!`);
                window.location.reload();

            } catch (err) {
                alert(err.message);
            } finally {
                btn.innerText = "Upload & Publish 🚀";
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
