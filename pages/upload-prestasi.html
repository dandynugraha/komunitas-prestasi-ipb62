<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .dropzone {
            border: 2px dashed #d1d5db;
            transition: 0.3s;
        }

        .dropzone.dragover {
            border-color: #9333ea;
            background: #f5f3ff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body class="p-6 md:p-10 text-white">

<div class="max-w-4xl mx-auto animate-[fadeIn_.4s_ease]">

    <!-- HEADER -->
    <h2 class="text-3xl font-extrabold mb-1 flex items-center gap-2">
        🏆 Lapor Prestasi
    </h2>
    <p class="text-white/80 mb-6">
        Bagikan pencapaianmu dan dapatkan poin 🎯
    </p>

    <!-- CARD -->
    <div class="bg-white/95 backdrop-blur-xl text-gray-800 p-6 md:p-8 rounded-2xl shadow-2xl border border-white/20">

        <!-- DROPZONE -->
        <div id="dropzone" 
        class="dropzone p-8 rounded-xl text-center cursor-pointer mb-6 
        border-2 border-dashed border-gray-300 
        hover:border-purple-500 hover:bg-purple-50 transition">

            <div class="flex flex-col items-center gap-2">
                <div class="text-3xl">📁</div>
                <p class="text-gray-600 font-semibold">
                    Drag & drop gambar
                </p>
                <p class="text-xs text-gray-400">
                    atau klik untuk upload
                </p>
            </div>

            <input type="file" id="fotoFile" accept="image/*" class="hidden">

            <img id="previewImage" class="mt-4 rounded-lg hidden max-h-48 shadow-md mx-auto">
        </div>

        <!-- FORM -->
        <h3 class="text-lg font-bold text-gray-700 mb-4">
            Informasi Prestasi
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

            <input id="tanggal" type="date"
                class="p-3 bg-gray-100 rounded-lg border border-gray-200 
                focus:ring-2 focus:ring-purple-500 outline-none">

            <select id="title"
                class="p-3 bg-gray-100 rounded-lg border border-gray-200 font-semibold 
                focus:ring-2 focus:ring-purple-500">
                <option>Juara 1</option>
                <option>Juara 2</option>
                <option>Juara 3</option>
                <option>Finalis</option>
            </select>

            <select id="tingkat"
                class="p-3 bg-gray-100 rounded-lg border border-gray-200 font-semibold 
                focus:ring-2 focus:ring-purple-500">
                <option>Internasional</option>
                <option>Nasional</option>
                <option>Provinsi</option>
                <option>Universitas</option>
            </select>

            <select id="metode" onchange="updatePlaceholder()"
                class="p-3 bg-gray-100 rounded-lg border border-gray-200 
                focus:ring-2 focus:ring-purple-500">
                <option value="offline">Offline</option>
                <option value="online">Online</option>
            </select>

            <input id="lokasi" placeholder="Nama Tempat"
                class="md:col-span-2 p-3 bg-gray-100 rounded-lg border border-gray-200 
                focus:ring-2 focus:ring-purple-500">

            <select id="cluster_lomba"
                class="md:col-span-2 p-3 bg-gray-100 rounded-lg border border-gray-200 
                font-semibold text-purple-600 focus:ring-2 focus:ring-purple-500">
                <option value="">-- Pilih Cluster --</option>
                <option>Bisnis</option>
                <option>Desain</option>
                <option>Kepenulisan</option>
                <option>Olimpiade</option>
            </select>

            <textarea id="story" placeholder="Ceritakan pengalamanmu..."
                class="md:col-span-2 h-32 p-3 bg-gray-100 rounded-lg border border-gray-200 
                resize-none focus:ring-2 focus:ring-purple-500"></textarea>

        </div>

        <!-- BUTTON -->
        <button onclick="uploadPrestasi()" id="btnUpload"
            class="w-full mt-6 bg-gradient-to-r from-yellow-400 via-yellow-500 to-yellow-600 
            text-black font-bold py-4 rounded-xl shadow-lg 
            hover:scale-[1.02] hover:shadow-xl 
            active:scale-95 transition duration-200">

            🚀 Upload & Publish
        </button>

    </div>
</div>

<script>
const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I";
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

let selectedFile = null;

// DRAG DROP
const dropzone = document.getElementById("dropzone");
const inputFile = document.getElementById("fotoFile");
const preview = document.getElementById("previewImage");

dropzone.addEventListener("click", () => inputFile.click());

inputFile.addEventListener("change", e => handleFile(e.target.files[0]));

dropzone.addEventListener("dragover", e => {
    e.preventDefault();
    dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave", () => {
    dropzone.classList.remove("dragover");
});

dropzone.addEventListener("drop", e => {
    e.preventDefault();
    dropzone.classList.remove("dragover");
    handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    preview.src = URL.createObjectURL(file);
    preview.classList.remove("hidden");
}

function getPoints() {
    return 100;
}

function updatePlaceholder() {
    const m = document.getElementById('metode').value;
    document.getElementById('lokasi').placeholder =
        (m === 'online') ? "Platform (Zoom, dll)" : "Nama Tempat";
}

async function uploadPrestasi() {
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) return alert("Login dulu!");

    if (!selectedFile) return alert("Upload gambar dulu!");

    const btn = document.getElementById("btnUpload");
    btn.innerText = "Uploading...";
    btn.disabled = true;

    try {
        const fileName = Date.now() + "-" + selectedFile.name;

        await _supabase.storage
            .from("prestasi-images")
            .upload(fileName, selectedFile);

        const { data } = _supabase.storage
            .from("prestasi-images")
            .getPublicUrl(fileName);

        await _supabase.from("prestasi").insert([{
            title: document.getElementById("title").value,
            foto_url: data.publicUrl,
            email_user: user.email
        }]);

        alert("Berhasil upload 🔥");
        location.reload();

    } catch (err) {
        alert(err.message);
    } finally {
        btn.innerText = "Upload 🚀";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
