<div class="animate-fadeInUp">
    <div style="margin-bottom:24px;">
        <h2 style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--ak-gray-900);">⚙️ HEG Panel</h2>
        <p style="color:var(--ak-gray-500);font-size:14px;margin-top:4px;">Human & Event — Kelola kehadiran, keaktifan, dan event</p>
    </div>

    <!-- TABS -->
    <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;">
        <button onclick="hegTab('members',this)" class="btn btn-primary btn-sm heg-tab active">👥 Semua Anggota</button>
        <button onclick="hegTab('attendance',this)" class="btn btn-ghost btn-sm heg-tab">📋 Absensi Event</button>
        <button onclick="hegTab('leaderboard',this)" class="btn btn-ghost btn-sm heg-tab">🏆 Leaderboard</button>
        <button onclick="hegTab('event',this)" class="btn btn-ghost btn-sm heg-tab">📅 Upload Event</button>
        <button onclick="hegTab('design',this)" class="btn btn-ghost btn-sm heg-tab">🎨 Pesan Design</button>
    </div>

    <!-- ALL MEMBERS -->
    <div id="heg-tab-members" class="heg-panel">
        <div class="card">
            <div style="padding:16px 24px;border-bottom:1px solid var(--ak-gray-100);display:flex;justify-content:space-between;align-items:center;">
                <h3 style="font-size:16px;font-weight:700;">Daftar Seluruh Anggota</h3>
                <input id="heg-search" class="form-input" placeholder="Cari nama..." style="max-width:240px;padding:8px 14px;font-size:13px;" oninput="hegFilterMembers()">
            </div>
            <div style="padding:0 24px;max-height:500px;overflow-y:auto;">
                <table class="table">
                    <thead><tr><th>Nama</th><th>Cluster</th><th>Role</th><th>Poin</th></tr></thead>
                    <tbody id="heg-member-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ATTENDANCE -->
    <div id="heg-tab-attendance" class="heg-panel" style="display:none;">
        <div class="card">
            <div style="padding:20px 24px;border-bottom:1px solid var(--ak-gray-100);">
                <h3 style="font-size:16px;font-weight:700;">Rekap Absensi Event</h3>
            </div>
            <div style="padding:0 24px;max-height:500px;overflow-y:auto;">
                <table class="table">
                    <thead><tr><th>Nama</th><th>Event</th><th>Status</th><th>Alasan</th></tr></thead>
                    <tbody id="heg-attendance-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- LEADERBOARD KEAKTIFAN -->
    <div id="heg-tab-leaderboard" class="heg-panel" style="display:none;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
            <div class="card">
                <div style="padding:20px 24px;border-bottom:1px solid var(--ak-gray-100);">
                    <h3 style="font-size:16px;font-weight:700;">🥇 Leaderboard Kehadiran</h3>
                </div>
                <div style="padding:0 24px;">
                    <table class="table">
                        <thead><tr><th>Rank</th><th>Nama</th><th>Hadir</th></tr></thead>
                        <tbody id="heg-lb-hadir"></tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <div style="padding:20px 24px;border-bottom:1px solid var(--ak-gray-100);">
                    <h3 style="font-size:16px;font-weight:700;">⭐ Leaderboard Poin Prestasi</h3>
                </div>
                <div style="padding:0 24px;">
                    <table class="table">
                        <thead><tr><th>Rank</th><th>Nama</th><th>Poin</th></tr></thead>
                        <tbody id="heg-lb-points"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- UPLOAD EVENT -->
    <div id="heg-tab-event" class="heg-panel" style="display:none;">
        <div class="card" style="padding:28px;max-width:600px;">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;">Upload Event / Pembinaan</h3>
            <div class="form-group">
                <label class="form-label">Judul Event</label>
                <input id="heg-ev-title" class="form-input" placeholder="Nama event">
            </div>
            <div class="form-group">
                <label class="form-label">Deskripsi</label>
                <textarea id="heg-ev-desc" class="form-textarea" placeholder="Penjelasan event..."></textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                    <label class="form-label">Tanggal & Waktu</label>
                    <input id="heg-ev-date" type="datetime-local" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Visibilitas</label>
                    <select id="heg-ev-vis" class="form-select">
                        <option value="all">Semua Anggota</option>
                        <option value="public">Public (Home)</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Link Poster (URL)</label>
                <input id="heg-ev-image" class="form-input" placeholder="https://...">
            </div>
            <button onclick="hegUploadEvent()" id="heg-ev-btn" class="btn btn-primary btn-block">Upload Event</button>
        </div>
    </div>

    <!-- DESIGN ORDER -->
    <div id="heg-tab-design" class="heg-panel" style="display:none;">
        <div class="card" style="padding:28px;max-width:600px;">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;">🎨 Pesan Design ke MBD</h3>
            <div class="form-group">
                <label class="form-label">Nama Event</label>
                <input id="heg-ds-event" class="form-input" placeholder="Nama event">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                    <label class="form-label">Jenis Design</label>
                    <select id="heg-ds-type" class="form-select">
                        <option>Ilustrasi</option><option>Desain Grafis</option><option>Video</option><option>Multimedia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Foto Mentor (Link Drive)</label>
                    <input id="heg-ds-photo" class="form-input" placeholder="https://drive.google.com/...">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Press Release / Brief</label>
                <textarea id="heg-ds-brief" class="form-textarea" placeholder="Detail kebutuhan design..."></textarea>
            </div>
            <button onclick="hegOrderDesign()" id="heg-ds-btn" class="btn btn-gold btn-block">Kirim ke MBD</button>
        </div>
    </div>
</div>

<style>
    @media (max-width:768px) {
        div[style*="grid-template-columns:1fr 1fr"] { grid-template-columns:1fr !important; }
    }
</style>

<script>
(function() {
    const user = getUser();
    let allMembers = [];

    async function init() {
        await Promise.all([loadMembers(), loadAttendance(), loadLeaderboards()]);
    }

    async function loadMembers() {
        try {
            const { data } = await db.from('profiles').select('*').order('name');
            allMembers = data || [];
            renderMembers(allMembers);
        } catch(e) {}
    }

    function renderMembers(list) {
        const tbody = document.getElementById('heg-member-list');
        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--ak-gray-400);">Tidak ditemukan.</td></tr>';
            return;
        }
        tbody.innerHTML = list.map(m => `
            <tr style="cursor:pointer;" onclick="hegShowMember('${m.email}')">
                <td><b>${m.name || m.full_name || '-'}</b><br><span style="font-size:11px;color:var(--ak-gray-400);">${m.email}</span></td>
                <td>${getClusterBadge(m.cluster || '-')}</td>
                <td><span class="badge badge-info" style="font-size:10px;">${m.role || 'member'}</span></td>
                <td style="font-family:var(--font-display);font-weight:700;color:var(--ak-gold);">${m.points || 0}</td>
            </tr>
        `).join('');
    }

    window.hegFilterMembers = function() {
        const q = document.getElementById('heg-search').value.toLowerCase();
        renderMembers(allMembers.filter(m => (m.name || m.email || '').toLowerCase().includes(q)));
    };

    window.hegShowMember = async function(email) {
        try {
            const [{ data: p }, { data: l }, { data: ev }] = await Promise.all([
                db.from('prestasi').select('title,tingkat,cluster').eq('email_user', email),
                db.from('lomba_tracking').select('nama_lomba,bidang,status').eq('email', email),
                db.from('event_attendance').select('status,event_id').eq('email', email)
            ]);
            const hadir = (ev || []).filter(e => e.status === 'Hadir').length;
            let msg = `<b>Prestasi:</b> ${p?.length || 0}<br><b>Lomba Tracking:</b> ${l?.length || 0}<br><b>Event Hadir:</b> ${hadir}`;
            if (p && p.length > 0) msg += '<br><br><b>Detail Prestasi:</b><br>' + p.map(x => `• ${x.title} (${x.tingkat} - ${x.cluster})`).join('<br>');
            if (l && l.length > 0) msg += '<br><br><b>Detail Lomba:</b><br>' + l.map(x => `• ${x.nama_lomba} [${x.status}]`).join('<br>');
            showModal(`Detail: ${email}`, msg, null);
        } catch(e) {}
    };

    async function loadAttendance() {
        try {
            const { data } = await db.from('event_attendance').select('*').order('created_at', { ascending: false }).limit(50);
            const tbody = document.getElementById('heg-attendance-list');
            if (data && data.length > 0) {
                tbody.innerHTML = data.map(a => `
                    <tr>
                        <td><b>${a.member_name || a.email}</b></td>
                        <td style="font-size:13px;">${a.event_id || '-'}</td>
                        <td><span class="badge ${a.status === 'Hadir' ? 'badge-success' : 'badge-danger'}">${a.status}</span></td>
                        <td style="font-size:13px;color:var(--ak-gray-500);">${a.alasan || '-'}</td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--ak-gray-400);">Belum ada data absensi.</td></tr>';
            }
        } catch(e) {}
    }

    async function loadLeaderboards() {
        // Points leaderboard
        try {
            const { data } = await db.from('profiles').select('name,full_name,points,cluster').order('points', { ascending: false }).limit(10);
            const tbody = document.getElementById('heg-lb-points');
            if (data && data.length > 0) {
                const rc = ['gold','silver','bronze'];
                tbody.innerHTML = data.map((m, i) => `
                    <tr>
                        <td><span class="lb-rank ${rc[i] || ''}">#${i+1}</span></td>
                        <td><b>${m.name || m.full_name || '-'}</b></td>
                        <td style="font-family:var(--font-display);font-weight:700;color:var(--ak-gold);">${m.points || 0}</td>
                    </tr>
                `).join('');
            }
        } catch(e) {}

        // Attendance leaderboard (count Hadir per person)
        try {
            const { data } = await db.from('event_attendance').select('email,member_name,status');
            const counts = {};
            (data || []).forEach(a => {
                if (a.status === 'Hadir') {
                    if (!counts[a.email]) counts[a.email] = { name: a.member_name || a.email, count: 0 };
                    counts[a.email].count++;
                }
            });
            const sorted = Object.values(counts).sort((a, b) => b.count - a.count).slice(0, 10);
            const tbody = document.getElementById('heg-lb-hadir');
            if (sorted.length > 0) {
                const rc = ['gold','silver','bronze'];
                tbody.innerHTML = sorted.map((m, i) => `
                    <tr>
                        <td><span class="lb-rank ${rc[i] || ''}">#${i+1}</span></td>
                        <td><b>${m.name}</b></td>
                        <td style="font-family:var(--font-display);font-weight:700;color:var(--ak-success);">${m.count}x</td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:24px;color:var(--ak-gray-400);">Belum ada data.</td></tr>';
            }
        } catch(e) {}
    }

    window.hegTab = function(tab, btn) {
        document.querySelectorAll('.heg-panel').forEach(p => p.style.display = 'none');
        document.getElementById('heg-tab-' + tab).style.display = 'block';
        document.querySelectorAll('.heg-tab').forEach(b => { b.className = 'btn btn-ghost btn-sm heg-tab'; });
        btn.className = 'btn btn-primary btn-sm heg-tab active';
    };

    window.hegUploadEvent = async function() {
        const title = document.getElementById('heg-ev-title').value.trim();
        if (!title) return showToast("Isi judul event!", "warning");
        setLoading("heg-ev-btn", true);
        try {
            await db.from('events').insert([{
                title, description: document.getElementById('heg-ev-desc').value,
                image_url: document.getElementById('heg-ev-image').value,
                visibility: document.getElementById('heg-ev-vis').value,
                created_by: user.email
            }]);
            showToast("Event berhasil diupload!", "success");
        } catch(e) { showToast("Error: " + e.message, "error"); }
        finally { setLoading("heg-ev-btn", false); }
    };

    window.hegOrderDesign = async function() {
        const ev = document.getElementById('heg-ds-event').value.trim();
        if (!ev) return showToast("Isi nama event!", "warning");
        setLoading("heg-ds-btn", true);
        try {
            await db.from('design_orders').insert([{
                event_name: ev,
                design_type: document.getElementById('heg-ds-type').value,
                photo_link: document.getElementById('heg-ds-photo').value,
                brief: document.getElementById('heg-ds-brief').value,
                ordered_by: user.email, status: 'pending'
            }]);
            showToast("Order design terkirim ke MBD!", "success");
        } catch(e) { showToast("Error: " + e.message, "error"); }
        finally { setLoading("heg-ds-btn", false); }
    };

    init();
})();
</script>
