<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Aksara Karya 62</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { display: flex; min-height: 100vh; background: var(--ak-gray-50); }

        /* ====== SIDEBAR ====== */
        .sidebar {
            width: var(--sidebar-width); position: fixed; top: 0; left: 0; bottom: 0;
            background: linear-gradient(180deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
            display: flex; flex-direction: column; z-index: 50;
            transition: transform .3s ease;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

        .sidebar-header {
            padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,.06);
        }
        .sidebar-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .sidebar-brand img { height: 36px; }
        .sidebar-brand h2 { font-family: var(--font-display); font-size: 16px; color: white; font-weight: 700; }
        .sidebar-user {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; background: rgba(255,255,255,.06);
            border-radius: var(--radius-md);
        }
        .sidebar-avatar {
            width: 36px; height: 36px; border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--ak-gold), var(--ak-gold-light));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; color: var(--ak-gray-900);
        }
        .sidebar-uname { font-size: 13px; color: white; font-weight: 600; }
        .sidebar-urole { font-size: 11px; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: .5px; }

        /* Menu */
        .sidebar-menu { flex: 1; padding: 16px 12px; }
        .menu-label {
            font-size: 10px; font-weight: 700; color: rgba(255,255,255,.3);
            text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px; margin-top: 12px;
        }
        .menu-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,.6);
            border-radius: var(--radius-sm); cursor: pointer; transition: all .15s;
            border: none; background: none; width: 100%; text-align: left;
            font-family: var(--font-body);
        }
        .menu-item:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.9); }
        .menu-item.active {
            background: rgba(255,255,255,.12); color: white;
            box-shadow: inset 3px 0 0 var(--ak-gold);
        }
        .menu-item i { width: 18px; text-align: center; font-size: 14px; }
        .menu-item.staff-item { color: var(--ak-gold-light); font-weight: 600; }
        .menu-item.staff-item:hover { background: rgba(245,158,11,.1); }

        .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,.06); }

        /* ====== MAIN CONTENT ====== */
        .main-wrap {
            flex: 1; margin-left: var(--sidebar-width);
            min-height: 100vh; transition: margin .3s ease;
        }
        .main-topbar {
            position: sticky; top: 0; z-index: 30;
            padding: 16px 32px; background: rgba(255,255,255,.8);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--ak-gray-100);
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-hamburger {
            display: none; background: none; border: none;
            font-size: 20px; cursor: pointer; color: var(--ak-gray-600);
            padding: 8px;
        }
        .topbar-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--ak-gray-800); }
        .main-content { padding: 28px 32px; }

        /* Loading */
        .page-loading {
            display: flex; align-items: center; justify-content: center;
            min-height: 300px; color: var(--ak-gray-400);
        }

        /* ====== OVERLAY ====== */
        .sidebar-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
            z-index: 40;
        }

        /* ====== MOBILE ====== */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
            .main-wrap { margin-left: 0; }
            .topbar-hamburger { display: block; }
            .main-content { padding: 20px 16px; }
            .main-topbar { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR OVERLAY (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-brand">
            <img src="images/logo.png" alt="AK62">
            <h2>Aksara Karya</h2>
        </div>
        <div class="sidebar-user">
            <div class="sidebar-avatar" id="userAvatar">U</div>
            <div>
                <div class="sidebar-uname" id="sidebarName">User</div>
                <div class="sidebar-urole" id="sidebarRole">member</div>
            </div>
        </div>
    </div>

    <nav class="sidebar-menu" id="menuContainer"></nav>

    <div class="sidebar-footer">
        <button onclick="logout()" class="btn btn-danger btn-sm btn-block">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </div>
</aside>

<!-- MAIN -->
<div class="main-wrap">
    <header class="main-topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="topbar-hamburger" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
            <span class="topbar-title" id="pageTitle">Dashboard</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:13px;color:var(--ak-gray-500);" id="topbarInfo"></span>
        </div>
    </header>
    <div class="main-content" id="mainContent">
        <div class="page-loading">
            <span class="spinner"></span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
const user = requireAuth();
if (!user) throw "No auth";

// Fill sidebar info
document.getElementById("sidebarName").textContent = user.name || user.full_name || "User";
document.getElementById("sidebarRole").textContent = user.role || "member";
document.getElementById("userAvatar").textContent = (user.name || user.full_name || "U").charAt(0).toUpperCase();
document.getElementById("topbarInfo").textContent = user.email || "";

/* ====== BUILD MENU ====== */
function buildMenu() {
    const menu = document.getElementById("menuContainer");
    const role = getUserRole();

    let html = `
        <div class="menu-label">Menu Utama</div>
        <button class="menu-item active" onclick="loadPage('pages/home-dashboard.html','Dashboard',this)">
            <i class="fa-solid fa-house"></i> Dashboard
        </button>
        <button class="menu-item" onclick="loadPage('pages/upload-prestasi.html','Upload Prestasi',this)">
            <i class="fa-solid fa-trophy"></i> Upload Prestasi
        </button>
        <button class="menu-item" onclick="loadPage('pages/upload-proyek.html','Upload Proyek',this)">
            <i class="fa-solid fa-diagram-project"></i> Upload Proyek
        </button>
        <button class="menu-item" onclick="loadPage('pages/lomba-saya.html','Lomba Saya',this)">
            <i class="fa-solid fa-flag"></i> Lomba Saya
        </button>
        <button class="menu-item" onclick="loadPage('pages/event-saya.html','Event Saya',this)">
            <i class="fa-solid fa-calendar"></i> Event Saya
        </button>
        <button class="menu-item" onclick="loadPage('pages/my-plan.html','My Plan',this)">
            <i class="fa-solid fa-calendar-days"></i> My Plan
        </button>
    `;

    // Role-based staff panels
    if (role.includes("cda") || role.includes("mbd") || role.includes("heg") || role.includes("bph") || role.includes("korvoks")) {
        html += `<div class="menu-label">Staff Panel</div>`;

        if (role.includes("bph")) {
            html += `<button class="menu-item staff-item" onclick="loadPage('staff/bph/bph.html','BPH Panel',this)">
                <i class="fa-solid fa-crown"></i> BPH Panel
            </button>`;
        }
        if (role.includes("cda")) {
            html += `<button class="menu-item staff-item" onclick="loadPage('staff/cda/cda.html','CDA Panel',this)">
                <i class="fa-solid fa-crosshairs"></i> CDA Panel
            </button>`;
        }
        if (role.includes("heg")) {
            html += `<button class="menu-item staff-item" onclick="loadPage('staff/heg/heg.html','HEG Panel',this)">
                <i class="fa-solid fa-gear"></i> HEG Panel
            </button>`;
        }
        if (role.includes("mbd")) {
            html += `<button class="menu-item staff-item" onclick="loadPage('staff/mbd/mbd.html','MBD Panel',this)">
                <i class="fa-solid fa-palette"></i> MBD Panel
            </button>`;
        }
        if (role.includes("korvoks")) {
            html += `<button class="menu-item staff-item" onclick="loadPage('staff/korvoks/korvoks.html','Korvoks Panel',this)">
                <i class="fa-solid fa-handshake"></i> Korvoks Panel
            </button>`;
        }
    }

    menu.innerHTML = html;
}

/* ====== LOAD PAGE ====== */
function loadPage(url, title, el) {
    const container = document.getElementById("mainContent");
    container.innerHTML = '<div class="page-loading"><span class="spinner"></span></div>';

    document.getElementById("pageTitle").textContent = title || "Dashboard";

    fetch(url)
        .then(res => {
            if (!res.ok) throw new Error("Not found");
            return res.text();
        })
        .then(html => {
            container.innerHTML = html;
            // Execute scripts in loaded page
            container.querySelectorAll("script").forEach(oldScript => {
                const newScript = document.createElement("script");
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                container.appendChild(newScript);
                oldScript.remove();
            });
        })
        .catch(() => {
            container.innerHTML = `
                <div style="text-align:center;padding:64px 24px;">
                    <div style="font-size:48px;margin-bottom:16px;">😢</div>
                    <h3 style="font-size:20px;color:var(--ak-gray-700);margin-bottom:8px;">Halaman Tidak Ditemukan</h3>
                    <p style="color:var(--ak-gray-500);">Coba refresh atau hubungi admin.</p>
                </div>
            `;
        });

    // Active state
    document.querySelectorAll(".menu-item").forEach(btn => btn.classList.remove("active"));
    if (el) el.classList.add("active");

    closeSidebar();
}

/* ====== SIDEBAR MOBILE ====== */
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebarOverlay").classList.toggle("show");
}
function closeSidebar() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebarOverlay").classList.remove("show");
}

/* ====== INIT ====== */
buildMenu();
setTimeout(() => {
    const firstBtn = document.querySelector(".menu-item");
    loadPage('pages/home-dashboard.html', 'Dashboard', firstBtn);
}, 100);
</script>
</body>
</html>
