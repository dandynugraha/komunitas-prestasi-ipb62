<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body class="p-6 md:p-10 text-white">

<div class="max-w-4xl mx-auto animate-[fadeIn_.4s_ease]">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 gap-4">
        <div>
            <h2 class="text-3xl font-extrabold flex items-center gap-2">
                🚩 Tracking Lomba
            </h2>
            <p class="text-white/80 text-sm mt-1">
                Data akan diteruskan ke PJ Cluster terkait
            </p>
        </div>

        <div class="w-14 h-14 bg-orange-500/20 text-orange-400 rounded-xl flex items-center justify-center text-xl">
            📍
        </div>
    </div>

    <!-- CARD -->
    <div class="bg-white/95 backdrop-blur-xl text-gray-800 p-6 md:p-8 rounded-2xl shadow-2xl border border-white/20">

        <!-- SECTION -->
        <h3 class="text-lg font-bold text-gray-700 mb-4">
            Informasi Kompetisi
        </h3>

        <form id="lombaForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">

            <div class="md:col-span-2">
                <label class="text-sm font-semibold text-gray-600 mb-1 block">Nama Kompetisi</label>
                <input id="nama_lomba"
                    placeholder="Contoh: Business Plan Competition"
                    class="w-full p-3 bg-gray-100 rounded-xl border border-gray-200 
                    focus:ring-2 focus:ring-orange-500 outline-none transition">
            </div>

            <div>
                <label class="text-sm font-semibold text-gray-600 mb-1 block">Penyelenggara</label>
                <input id="penyelenggara"
                    placeholder="Nama Universitas/Instansi"
                    class="w-full p-3 bg-gray-100 rounded-xl border border-gray-200 
                    focus:ring-2 focus:ring-orange-500 outline-none transition">
            </div>

            <div>
                <label class="text-sm font-semibold text-gray-600 mb-1 block">Bidang / Cluster</label>
                <select id="bidang"
                    class="w-full p-3 bg-gray-100 rounded-xl border border-gray-200 
                    focus:ring-2 focus:ring-orange-500 outline-none">
                    <option>Bisnis</option>
                    <option>Desain</option>
                    <option>Penulisan</option>
                    <option>Olimpiade</option>
                </select>
            </div>

            <div>
                <label class="text-sm font-semibold text-gray-600 mb-1 block">Tanggal Daftar</label>
                <input id="tanggal_daftar" type="date"
                    class="w-full p-3 bg-gray-100 rounded-xl border border-gray-200 
                    focus:ring-2 focus:ring-orange-500 outline-none">
            </div>

            <div>
                <label class="text-sm font-semibold text-gray-600 mb-1 block">Status Saat Ini</label>
                <select id="status"
                    class="w-full p-3 bg-orange-500 text-white rounded-xl border-none font-semibold">
                    <option value="Peserta">Peserta</option>
                    <option value="Semifinalis">Semifinalis</option>
                    <option value="Finalis">Finalis</option>
                </select>
            </div>

        </form>

        <!-- BUTTON -->
        <button onclick="saveLomba()" 
            class="w-full mt-6 bg-gradient-to-r from-orange-400 to-orange-500 
            text-white font-bold py-4 rounded-xl shadow-lg 
            hover:scale-[1.02] active:scale-95 transition">

            🚀 Submit Tracking
        </button>

    </div>
</div>

<script>
const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I";

async function saveLomba() {

    const nama = document.getElementById('nama_lomba').value.trim();

        alert("⚠️ Isi semua data dulu!");
        return;
    }

</body>
</html>
