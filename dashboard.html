<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Member Dashboard - AK62</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
</head>
<body class="bg-slate-50 flex">
    <aside class="w-64 min-h-screen bg-blue-900 text-white p-6 space-y-4">
        <h2 class="font-black text-xl mb-8">AK62 MEMBER</h2>
        <nav class="space-y-2">
            <a href="#prestasi" class="block p-3 hover:bg-blue-800 rounded-xl">🏆 Upload Prestasi</a>
            <a href="#proyek" class="block p-3 hover:bg-blue-800 rounded-xl">🚀 Upload Proyek</a>
            <a href="#lomba" class="block p-3 hover:bg-blue-800 rounded-xl">📝 Lomba Saya</a>
            <a href="#event" class="block p-3 hover:bg-blue-800 rounded-xl">📅 Event Saya</a>
            <a href="#plan" class="block p-3 hover:bg-blue-800 rounded-xl">📌 My Plan</a>
            <button onclick="logout()" class="block w-full text-left p-3 text-red-400 hover:bg-red-900/30 rounded-xl mt-10">Logout</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div id="header" class="mb-10">
            <h1 id="userTitle" class="text-3xl font-bold">Halo, Member!</h1>
            <p id="userSub" class="text-slate-500"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div id="prestasi" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h4 class="font-bold mb-4">Upload Prestasi</h4>
                </div>

            <div id="proyek" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h4 class="font-bold mb-4">Proyek & Timeline</h4>
                </div>
        </div>

        <div id="plan" class="mt-10 bg-white p-8 rounded-3xl shadow-sm">
            <h4 class="font-bold mb-4">My Plan (Kalender)</h4>
            <div id="calendar"></div>
        </div>
    </main>

    <script>
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if(!user) window.location.href = 'index.html';

        document.getElementById('userTitle').innerText = `Halo, ${user.name}!`;
        document.getElementById('userSub').innerText = `Cluster ${user.cluster}`;

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        // Inisialisasi Kalender & Fitur lainnya di sini...
    </script>
</body>
</html>
