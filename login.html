<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Aksara Karya 62</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(160deg, #0f0a2e 0%, #1e1b4b 30%, #6d28d9 70%, #9333ea 100%);
            position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(139,92,246,.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(245,158,11,.1) 0%, transparent 40%);
        }
        .login-card {
            position: relative; z-index: 2; width: 100%; max-width: 420px; margin: 24px;
            background: rgba(255,255,255,.95); backdrop-filter: blur(20px);
            border-radius: var(--radius-xl); box-shadow: 0 25px 50px rgba(0,0,0,.15);
            padding: 48px 36px; animation: fadeInUp .5s ease;
        }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo img { height: 48px; margin-bottom: 16px; }
        .login-logo h1 {
            font-family: var(--font-display); font-size: 24px; font-weight: 700;
            color: var(--ak-gray-900); margin-bottom: 4px;
        }
        .login-logo p { font-size: 14px; color: var(--ak-gray-500); }
        .login-divider { height: 1px; background: var(--ak-gray-200); margin: 24px 0; }
        .error-msg {
            background: rgba(239,68,68,.08); color: #dc2626; padding: 10px 14px;
            border-radius: var(--radius-sm); font-size: 13px; margin-top: 16px;
            display: none; text-align: center;
        }
        .error-msg.show { display: block; animation: fadeIn .2s ease; }
        .back-link {
            display: block; text-align: center; margin-top: 24px;
            color: var(--ak-gray-500); font-size: 13px; text-decoration: none;
        }
        .back-link:hover { color: var(--ak-purple); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-logo">
        <img src="images/logo.png" alt="Aksara Karya 62">
        <h1>Aksara Karya 62</h1>
        <p>Portal Internal Staff & Anggota</p>
    </div>

    <div class="form-group">
        <label class="form-label">Email</label>
        <input id="email" type="email" placeholder="nama@apps.ipb.ac.id" class="form-input">
    </div>

    <div class="form-group">
        <label class="form-label">Password / Kode Anggota</label>
        <div style="position:relative;">
            <input id="password" type="password" placeholder="••••••••" class="form-input" style="padding-right:48px;">
            <button onclick="togglePw()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ak-gray-400);">
                <i id="pwIcon" class="fa-solid fa-eye"></i>
            </button>
        </div>
    </div>

    <button onclick="handleLogin()" id="btnLogin" class="btn btn-gold btn-lg btn-block" style="margin-top:8px;">
        <i class="fa-solid fa-right-to-bracket"></i> Masuk Sekarang
    </button>

    <div id="errorMsg" class="error-msg"></div>

    <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Kembali ke Halaman Utama
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
    function togglePw() {
        const pw = document.getElementById("password");
        const icon = document.getElementById("pwIcon");
        if (pw.type === "password") {
            pw.type = "text";
            icon.className = "fa-solid fa-eye-slash";
        } else {
            pw.type = "password";
            icon.className = "fa-solid fa-eye";
        }
    }

    async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const btn = document.getElementById("btnLogin");
        const errEl = document.getElementById("errorMsg");

        errEl.classList.remove("show");

        if (!email || !password) {
            errEl.textContent = "Email & password harus diisi!";
            errEl.classList.add("show");
            return;
        }

        btn.innerHTML = '<span class="spinner" style="display:inline-block;width:18px;height:18px;"></span> Memvalidasi...';
        btn.disabled = true;

        try {
            const { data, error } = await db
                .from("profiles")
                .select("*")
                .eq("email", email)
                .eq("password", password);

            if (error) throw error;

            if (data && data.length > 0) {
                let user = data[0];
                if (!user.role) user.role = "member";
                localStorage.setItem("user", JSON.stringify(user));
                window.location.href = "dashboard.html";
            } else {
                errEl.textContent = "Akun tidak ditemukan atau password salah.";
                errEl.classList.add("show");
            }
        } catch (err) {
            errEl.textContent = "Error: " + err.message;
            errEl.classList.add("show");
        } finally {
            btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk Sekarang';
            btn.disabled = false;
        }
    }

    document.addEventListener("keypress", (e) => { if (e.key === "Enter") handleLogin(); });
</script>
</body>
</html>
