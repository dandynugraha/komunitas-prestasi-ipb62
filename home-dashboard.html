<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="p-10 bg-[#F8FAFC]">
    <header class="flex justify-between items-center mb-10">
        <div>
            <h2 class="text-3xl font-black text-blue-900 uppercase">Halo, <span id="userName">User</span>!</h2>
            <p class="text-gray-500 font-medium">Selamat datang kembali di Portal Aksara Karya 62.</p>
        </div>
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 flex items-center space-x-4">
            <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-xl">
                <i class="fa-solid fa-star"></i>
            </div>
            <div>
                <p class="text-xs text-gray-400 font-black uppercase tracking-widest">Total Poin</p>
                <p id="userPoints" class="text-2xl font-black text-blue-600">0 PTS</p>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
            <h3 class="text-xl font-black text-gray-800 mb-6 flex items-center">
                <i class="fa-solid fa-clock-rotate-left mr-3 text-blue-500"></i> Riwayat Prestasi
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <tbody id="myAchievementList">
                        <tr><td class="py-4 text-gray-400 italic">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
            <h3 class="text-xl font-black text-gray-800 mb-6 flex items-center">
                <i class="fa-solid fa-calendar-check mr-3 text-green-500"></i> Rencana Mendatang
            </h3>
            <div id="myPlanList" class="space-y-4">
                <p class="text-gray-400 italic">Memuat rencana...</p>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const user = JSON.parse(localStorage.getItem("user"));

        async function loadDashboardData() {
            if (!user) return;
            document.getElementById('userName').innerText = user.full_name || user.name || "User";

            // 1. Ambil Poin Terbaru dari Tabel Profiles
            const { data: profile } = await _supabase.from('profiles').select('points').eq('email', user.email).single();
            if(profile) document.getElementById('userPoints').innerText = `${profile.points || 0} PTS`;

            // 2. Load Prestasi Milik Saya
            const { data: prestasis } = await _supabase
                .from('prestasi')
                .select('*')
                .eq('email_user', user.email)
                .order('created_at', { ascending: false });

            const prestList = document.getElementById('myAchievementList');
            if (prestasis && prestasis.length > 0) {
                prestList.innerHTML = prestasis.map(p => `
                    <tr class="border-b last:border-0">
                        <td class="py-4">
                            <p class="font-bold text-gray-800">${p.title}</p>
                            <p class="text-xs text-gray-400">${p.tingkat} • ${p.cluster}</p>
                        </td>
                        <td class="py-4 text-right">
                            <span class="text-blue-600 font-black">+${p.points_given || 0}</span>
                        </td>
                    </tr>
                `).join('');
            } else {
                prestList.innerHTML = "<tr><td class='py-4 text-gray-400'>Belum ada prestasi.</td></tr>";
            }

            // 3. Load Plans Milik Saya
            const { data: plans } = await _supabase
                .from('user_plans')
                .select('*')
                .eq('email', user.email)
                .order('tanggal', { ascending: true });

            const planBox = document.getElementById('myPlanList');
            if (plans && plans.length > 0) {
                planBox.innerHTML = plans.map(pl => `
                    <div class="flex items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div class="bg-blue-600 text-white p-2 px-3 rounded-xl mr-4 text-center">
                            <p class="text-[10px] font-bold uppercase">${new Date(pl.tanggal).toLocaleString('id-ID', {month: 'short'})}</p>
                            <p class="text-lg font-black">${new Date(pl.tanggal).getDate()}</p>
                        </div>
                        <p class="font-bold text-sm text-gray-700">${pl.catatan}</p>
                    </div>
                `).join('');
            } else {
                planBox.innerHTML = "<p class='text-gray-400 text-sm'>Belum ada rencana.</p>";
            }
        }

        loadDashboardData();
    </script>
</body>
</html>
