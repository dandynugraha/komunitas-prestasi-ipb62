<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aksara Karya 62 - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen flex flex-col md:flex-row">
        <div class="md:w-1/2 bg-blue-900 flex items-center justify-center p-12 relative overflow-hidden">
            <div class="relative z-10 text-white">
                <h1 class="text-5xl font-black mb-4">AK62 DATABASE</h1>
                <p class="text-xl opacity-80">Sistem Informasi Prestasi & Manajemen Proyek Aksara Karya 62 IPB University.</p>
            </div>
            <div class="absolute -bottom-20 -left-20 w-80 h-80 bg-orange-500 rounded-full opacity-20"></div>
        </div>

        <div class="md:w-1/2 flex items-center justify-center p-8">
            <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-3xl font-bold mb-2 text-blue-900 text-center">Selamat Datang</h2>
                <p class="text-slate-400 text-center mb-8">Silakan masuk dengan email IPB dan kode anggota</p>
                
                <div class="space-y-4">
                    <input type="email" id="email" placeholder="Email IPB (@apps.ipb.ac.id)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none">
                    <input type="password" id="password" placeholder="Kode Anggota" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none">
                    <button onclick="handleLogin()" class="w-full bg-blue-900 text-white p-5 rounded-2xl font-bold hover:bg-black transition shadow-lg shadow-blue-100">MASUK KE DASHBOARD</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Cek ke tabel profiles (Hasil import CSV)
            const { data, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('email', email)
                .eq('password', password)
                .single();

            if (data) {
                localStorage.setItem('currentUser', JSON.stringify(data));
                Swal.fire({ title: 'Berhasil!', text: 'Mengarahkan...', icon: 'success', timer: 1000, showConfirmButton: false });
                
                setTimeout(() => {
                    if(data.role.toLowerCase().includes('member')) {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'staff.html';
                    }
                }, 1000);
            } else {
                Swal.fire('Gagal!', 'Email atau Kode Anggota salah.', 'error');
            }
        }
    </script>
</body>
</html>
