<!DOCTYPE html>

<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Dashboard</h2>

<input id="title" placeholder="judul">
<input id="image" placeholder="link gambar">
<input id="rank" placeholder="juara">
<input id="location" placeholder="lokasi">

<select id="cluster">
<option>Bisnis</option>
<option>Desain</option>
<option>Olimpiade</option>
<option>Penulisan</option>
</select>

<textarea id="story"></textarea>

<button onclick="upload()">Upload Prestasi</button>

<script>

const supabase = supabase.createClient(
"https://uaygxlfwrsbjfsjmfpum.supabase.co",
"ANON_KEY_KAMU"
)

const user=JSON.parse(localStorage.getItem("user"))

if(!user){
location.href="login.html"
}

async function upload(){

await supabase.from("prestasi").insert([{
title:document.getElementById("title").value,
image:document.getElementById("image").value,
rank:document.getElementById("rank").value,
location:document.getElementById("location").value,
cluster:document.getElementById("cluster").value,
story:document.getElementById("story").value,
member_name:user.name
}])

alert("berhasil")

}

</script>

</body>
</html>
