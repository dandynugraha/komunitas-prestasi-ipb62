<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>My Plan - AK62</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="p-10 bg-[#F8FAFC]">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
            <h2 class="text-xl font-black mb-6 italic text-gray-800">📅 Kalender Rencana (Pribadi)</h2>
            <div class="grid grid-cols-7 gap-2 text-center text-xs font-bold text-gray-400 mb-4">
                <div>MIN</div><div>SEN</div><div>SEL</div><div>RAB</div><div>KAM</div><div>JUM</div><div>SAB</div>
            </div>
            <div class="grid grid-cols-7 gap-3" id="calendar-grid">
                </div>
        </div>

        <div class="bg-blue-900 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-blue-200 h-fit">
            <p class="font-black mb-6 flex items-center"><i class="fa-solid fa-bell mr-2"></i> Set Reminder Email</p>
            
            <div class="space-y-4 text-sm">
                <div>
                    <label class="block opacity-70 mb-1">Tanggal Terpilih</label>
                    <input id="plan-date" type="date" class="w-full bg-blue-800 p-4 rounded-2xl border-none text-white outline-none">
                </div>
                <div>
                    <label class="block opacity-70 mb-1">Catatan Rencana</label>
                    <textarea id="plan-note" placeholder="Apa rencana kamu besok? (Contoh: Deadline Proposal PIMNAS)" class="w-full bg-blue-800 p-4 rounded-2xl h-40 border-none text-white outline-none resize-none"></textarea>
                </div>
                <button onclick="savePlan()" id="btnSave" class="w-full bg-blue-500 hover:bg-blue-400 p-5 rounded-2xl font-black transition shadow-lg active:scale-95">
                    Aktifkan Reminder
                </button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Render Kalender
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";
            for(let i=1; i<=31; i++) {
                const day = document.createElement('div');
                day.className = "h-14 bg-gray-50 flex items-center justify-center rounded-2xl hover:bg-blue-100 cursor-pointer transition font-bold text-gray-600";
                day.innerText = i;
                day.onclick = () => {
                    // Reset style
                    document.querySelectorAll('#calendar-grid div').forEach(d => d.classList.remove('bg-blue-600', 'text-white'));
                    // Set active
                    day.classList.add('bg-blue-600', 'text-white');
                    // Format tanggal (asumsi Maret 2024)
                    const formattedDate = `2024-03-${i.toString().padStart(2, '0')}`;
                    document.getElementById('plan-date').value = formattedDate;
                };
                grid.appendChild(day);
            }
        }

        async function savePlan() {
            const user = JSON.parse(localStorage.getItem("user"));
            const date = document.getElementById('plan-date').value;
            const note = document.getElementById('plan-note').value;

            if(!date || !note) return alert("Pilih tanggal dan isi catatan!");

            const btn = document.getElementById('btnSave');
            btn.innerText = "Menyimpan...";

            const { error } = await _supabase.from('user_plans').insert([{
                user_id: user.id,
                email: user.email,
                tanggal: date,
                catatan: note
            }]);

            if(!error) {
                alert("Reminder Aktif! Notifikasi akan dikirim h-1 ke email kamu.");
                document.getElementById('plan-note').value = "";
            } else {
                alert("Gagal simpan: " + error.message);
            }
            btn.innerText = "Aktifkan Reminder";
        }

        renderCalendar();
    </script>
</body>
</html>
